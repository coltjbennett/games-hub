        function updateHistoryUI() {
            const undoBtn = document.getElementById('btn-undo');
            const redoBtn = document.getElementById('btn-redo');
            if (actionHistory.length > 0) undoBtn.classList.remove('disabled'); else undoBtn.classList.add('disabled');
            if (redoHistory.length > 0) redoBtn.classList.remove('disabled'); else redoBtn.classList.add('disabled');
        }

        function resetBoardState() {
            units.forEach(u => scene.remove(u.mesh)); projectiles.forEach(p => scene.remove(p.mesh)); particles.forEach(pt => scene.remove(pt.mesh)); floatTexts.forEach(f => scene.remove(f.sprite));
            units.forEach(u => { if (u.incomingLine) scene.remove(u.incomingLine); });
            units = []; projectiles = []; particles = []; floatTexts = []; actionHistory = []; redoHistory = [];
            currentPathLastWaypoint = null;
            cameraTarget.set(0, 0, 0); updateCameraPositionReal(); gameState = GAME_STATES.PLACEMENT;
            document.getElementById('game-status').innerText = "PHASE: PLACEMENT"; document.getElementById('game-status').style.color = '#52b788';
            document.getElementById('btn-start').style.display = 'block'; document.getElementById('btn-next').style.display = 'none';
            if(centerDivider) scene.add(centerDivider);
        }

        // --- PART 3: KEYBOARD HANDLERS ---
        function setupKeyboardHandlers() {
            window.addEventListener('keydown', (e) => {
                keysPressed[e.code] = true;
                // If pressing Space or Shift while dragging, cancel any placement drag
                if (e.code === 'Space' || e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
                    // Stop left drag from placing
                    isLeftDragging = false;
                    lastPlacedPosition.set(999, 999, 999);
                }
            });
            window.addEventListener('keyup', (e) => {
                keysPressed[e.code] = false;
            });
        }

        // --- INTERACTION & INPUT ---
        function setupInteractionHandlers() {
            const c = document.getElementById('canvas-container');
            // Touch events (mobile — unchanged)
            c.addEventListener('touchstart', handlePointerDown, { passive: false });
            c.addEventListener('touchmove', handlePointerMove, { passive: false });
            c.addEventListener('touchend', handlePointerUp, { passive: false });
            // Mouse events
            c.addEventListener('mousedown', handlePointerDown, false);
            window.addEventListener('mousemove', handlePointerMove, false);
            window.addEventListener('mouseup', handlePointerUp, false);
            c.addEventListener('wheel', handleMouseWheel, { passive: false });
        }

        function updateCameraPositionReal() {
            let xOffset = camRadius * Math.sin(camPhi) * Math.cos(camTheta); let zOffset = camRadius * Math.sin(camPhi) * Math.sin(camTheta); let yOffset = camRadius * Math.cos(camPhi);
            camera.position.set(cameraTarget.x + xOffset, cameraTarget.y + yOffset, cameraTarget.z + zOffset); camera.lookAt(cameraTarget);
        }

        function handlePointerDown(e) {
            currentPathLastWaypoint = null;
            if(e.type === 'touchstart') {
                e.preventDefault();
                // MOBILE: unchanged touch logic
                for (let i = 0; i < e.touches.length; i++) activeTouches[e.touches[i].identifier] = { x: e.touches[i].clientX, y: e.touches[i].clientY };
                const ids = Object.keys(activeTouches);
                if(ids.length === 1) {
                    isLeftDragging = true;
                    executePlacementRaycast(activeTouches[ids[0]].x, activeTouches[ids[0]].y);
                } else if(ids.length === 2) {
                    isLeftDragging = false; isRightDragging = true;
                    let t0 = activeTouches[ids[0]]; let t1 = activeTouches[ids[1]];
                    touchStartDist = Math.hypot(t1.x - t0.x, t1.y - t0.y);
                    touchStartAngle = Math.atan2(t1.y - t0.y, t1.x - t0.x);
                    touchStartCenter.set((t0.x + t1.x)/2, (t0.y + t1.y)/2);
                    touchStartTarget.copy(cameraTarget); touchStartRadius = camRadius; touchStartTheta = camTheta;
                }
            } else {
                // MOUSE ONLY — PART 3
                if (e.button === 0) {
                    isLeftDragging = true;
                    mouseDragStart.set(e.clientX, e.clientY);
                    // Determine camera mode from modifier keys
                    if (keysPressed['Space']) {
                        mouseCameraMode = 'rotate';
                        touchStartTheta = camTheta; // store start angle
                    } else if (keysPressed['ShiftLeft'] || keysPressed['ShiftRight'] || e.shiftKey) {
                        mouseCameraMode = 'pan';
                    } else {
                        mouseCameraMode = null; // normal placement mode
                        executePlacementRaycast(e.clientX, e.clientY);
                    }
                }
            }
        }

        function handlePointerMove(e) {
            if(e.type === 'touchmove') {
                e.preventDefault();
                // MOBILE: unchanged touch logic
                for (let i = 0; i < e.touches.length; i++) {
                    if(activeTouches[e.touches[i].identifier]) {
                        activeTouches[e.touches[i].identifier].x = e.touches[i].clientX;
                        activeTouches[e.touches[i].identifier].y = e.touches[i].clientY;
                    }
                }
                const ids = Object.keys(activeTouches);
                if(ids.length === 1 && isLeftDragging) {
                    executePlacementRaycast(activeTouches[ids[0]].x, activeTouches[ids[0]].y);
                } else if(ids.length === 2 && isRightDragging) {
                    let t0 = activeTouches[ids[0]]; let t1 = activeTouches[ids[1]];
                    let currentDist = Math.hypot(t1.x - t0.x, t1.y - t0.y);
                    camRadius = Math.max(20, Math.min(130, touchStartRadius * (touchStartDist / Math.max(currentDist, 1))));
                    camTheta = touchStartTheta + (Math.atan2(t1.y - t0.y, t1.x - t0.x) - touchStartAngle);
                    let currentCenter = new THREE.Vector2((t0.x + t1.x)/2, (t0.y + t1.y)/2);
                    applyRelativeCameraPanning(currentCenter.x - touchStartCenter.x, currentCenter.y - touchStartCenter.y);
                    touchStartCenter.copy(currentCenter); updateCameraPositionReal();
                }
            } else {
                // MOUSE ONLY — PART 3
                // Always update mouse world position for ghost path preview
                updateMouseWorldPos(e.clientX, e.clientY);

                if (isLeftDragging) {
                    if (mouseCameraMode === 'rotate') {
                        // Space + Left Drag = rotate
                        const deltaX = e.clientX - mouseDragStart.x;
                        camTheta = touchStartTheta - (deltaX * 0.007);
                        updateCameraPositionReal();
                    } else if (mouseCameraMode === 'pan') {
                        // Shift + Left Drag = pan
                        const deltaX = e.clientX - mouseDragStart.x;
                        const deltaY = e.clientY - mouseDragStart.y;
                        applyRelativeCameraPanning(deltaX, -deltaY);
                        mouseDragStart.set(e.clientX, e.clientY);
                        updateCameraPositionReal();
                    } else {
                        // Normal placement drag
                        executePlacementRaycast(e.clientX, e.clientY);
                    }
                }
            }
        }

        function updateMouseWorldPos(scrX, scrY) {
            if (!terrainMesh) return;
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2((scrX / window.innerWidth) * 2 - 1, -(scrY / window.innerHeight) * 2 + 1);
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(terrainMesh);
            if (intersects.length > 0) mouseWorldPos.copy(intersects[0].point);
        }

        function applyRelativeCameraPanning(deltaX, deltaY) {
            let forwardVector = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); forwardVector.y = 0; forwardVector.normalize();
            let rightVector = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion); rightVector.y = 0; rightVector.normalize();
            let scalar = camRadius * 0.0016; cameraTarget.addScaledVector(rightVector, -deltaX * scalar); cameraTarget.addScaledVector(forwardVector, deltaY * scalar);
            cameraTarget.x = Math.max(-40, Math.min(40, cameraTarget.x)); cameraTarget.z = Math.max(-30, Math.min(30, cameraTarget.z));
        }

        function handlePointerUp(e) {
            if(e.changedTouches) { for (let i = 0; i < e.changedTouches.length; i++) delete activeTouches[e.changedTouches[i].identifier]; }
            isLeftDragging = false; isRightDragging = false;
            mouseCameraMode = null;
            lastPlacedPosition.set(999,999,999);
            // Don't reset currentPathLastWaypoint on mouseup — only on new mousedown
        }

        function handleMouseWheel(e) { e.preventDefault(); camRadius = Math.max(20, Math.min(130, camRadius + e.deltaY * 0.04)); updateCameraPositionReal(); }

        function executePlacementRaycast(scrX, scrY) {
            // PART 3: Guard — if Space or Shift is down, never place
            if (keysPressed['Space'] || keysPressed['ShiftLeft'] || keysPressed['ShiftRight']) return;

            if (gameState !== GAME_STATES.PLACEMENT) return;
            const cost = UNIT_TYPES[selectedUnitType].cost; if (cost > currentBudget) return;
            const raycaster = new THREE.Raycaster(); const mouse = new THREE.Vector2((scrX / window.innerWidth) * 2 - 1, -(scrY / window.innerHeight) * 2 + 1); raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(terrainMesh);
            
            if (intersects.length > 0) {
                const hit = intersects[0].point;
                
                if (selectedUnitType === 'TARGET_MARK') {
                    if (hit.x < 1.2 || hit.x > 45 || hit.z < -32 || hit.z > 32) return; 
                } else if (selectedUnitType === 'WAYPOINT') {
                    if (currentPathLastWaypoint && hit.distanceTo(currentPathLastWaypoint.mesh.position) < 2.5) return;
                    if (hit.x > 54 || hit.x < -54 || hit.z < -34 || hit.z > 34) return;
                } else {
                    if (hit.distanceTo(lastPlacedPosition) < 1.6) return;
                    if (hit.x > -1.2 || hit.x < -45 || hit.z < -32 || hit.z > 32) return;
                }

                let unitTeam = (selectedUnitType === 'TARGET_MARK') ? TEAMS.CHINESE : TEAMS.MONGOL;
                let newU = new Unit(selectedUnitType, unitTeam, hit.x, hit.z);
                let prevWp = null;

                if (selectedUnitType === 'WAYPOINT') {
                    if (currentPathLastWaypoint) {
                        currentPathLastWaypoint.nextWaypoint = newU;
                        prevWp = currentPathLastWaypoint;
                        let points = [currentPathLastWaypoint.mesh.position.clone().add(new THREE.Vector3(0,0.4,0)), newU.mesh.position.clone().add(new THREE.Vector3(0,0.4,0))];
                        let lineGeo = new THREE.BufferGeometry().setFromPoints(points);
                        let lineMat = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.5 });
                        let line = new THREE.Line(lineGeo, lineMat);
                        scene.add(line);
                        newU.incomingLine = line;
                    }
                    currentPathLastWaypoint = newU;
                }

                units.push(newU); currentBudget -= cost; lastPlacedPosition.copy(hit); 
                actionHistory.push({ action: 'place', unit: newU, cost: cost, prevWp: prevWp });
                redoHistory = []; 
                updateBudgetUI(); updateHistoryUI();
            }
        }

        // --- BUTTON BINDINGS & GAME LOOP ---
        function setupUIListeners() {
            // Unit selector in main row
            document.getElementById('unit-selector-group').addEventListener('click', (e) => {
                const b = e.target.closest('.btn'); if(!b || b.classList.contains('disabled') || b.classList.contains('locked')) return;
                document.querySelectorAll('#unit-selector-group .btn').forEach(x => x.classList.remove('selected'));
                document.querySelectorAll('#placement-tools-group .btn-tool').forEach(x => x.classList.remove('selected'));
                b.classList.add('selected'); selectedUnitType = b.getAttribute('data-unit-type');
                currentPathLastWaypoint = null;
            });

            // Placement tools (Draw Path, Target Flag) in the permanent top row
            document.getElementById('placement-tools-group').addEventListener('click', (e) => {
                const b = e.target.closest('.btn-tool'); if(!b) return;
                // Deselect all other buttons
                document.querySelectorAll('#unit-selector-group .btn').forEach(x => x.classList.remove('selected'));
                document.querySelectorAll('#placement-tools-group .btn-tool').forEach(x => x.classList.remove('selected'));
                b.classList.add('selected');
                selectedUnitType = b.getAttribute('data-unit-type');
                if (selectedUnitType !== 'WAYPOINT') currentPathLastWaypoint = null;
            });
            
            document.getElementById('btn-undo').addEventListener('click', () => {
                if (gameState !== GAME_STATES.PLACEMENT || actionHistory.length === 0) return;
                let action = actionHistory.pop();
                scene.remove(action.unit.mesh); 
                if (action.unit.incomingLine) scene.remove(action.unit.incomingLine);
                if (action.prevWp) action.prevWp.nextWaypoint = null;
                // Reset currentPathLastWaypoint to prevWp if it was the last waypoint
                if (action.unit.type === 'WAYPOINT') {
                    currentPathLastWaypoint = action.prevWp || null;
                }
                units = units.filter(u => u !== action.unit);
                currentBudget += action.cost; redoHistory.push(action);
                updateBudgetUI(); updateHistoryUI();
            });
            document.getElementById('btn-redo').addEventListener('click', () => {
                if (gameState !== GAME_STATES.PLACEMENT || redoHistory.length === 0) return;
                let action = redoHistory.pop();
                scene.add(action.unit.mesh); 
                if (action.unit.incomingLine) scene.add(action.unit.incomingLine);
                if (action.prevWp) action.prevWp.nextWaypoint = action.unit;
                if (action.unit.type === 'WAYPOINT') {
                    currentPathLastWaypoint = action.unit;
                }
                units.push(action.unit);
                currentBudget -= action.cost; actionHistory.push(action);
                updateBudgetUI(); updateHistoryUI();
            });

            document.getElementById('btn-start').addEventListener('click', () => {
                if(gameState === GAME_STATES.PLACEMENT) {
                    if(units.filter(u => u.team === TEAMS.MONGOL && u.type !== 'GENGHIS' && u.targetable).length === 0) { alert("Deploy additional Mongol forces to escort Genghis!"); return; }
                    
                    let commanders = units.filter(u => u.team === TEAMS.MONGOL && u.type === 'COMMANDER');
                    units.forEach(u => {
                        if (u.team === TEAMS.MONGOL && u.type !== 'COMMANDER' && u.type !== 'GENGHIS' && u.targetable) {
                             for (let c of commanders) { if (u.mesh.position.distanceTo(c.mesh.position) <= c.range) { u.assignedCommander = c; break; } }
                        }
                    });

                    let marks = units.filter(u => u.type === 'TARGET_MARK');
                    units.forEach(u => {
                        if (u.team === TEAMS.CHINESE && u.targetable) {
                            for (let m of marks) { if (u.mesh.position.distanceTo(m.mesh.position) <= m.range) { u.isTargetMarked = true; break; } }
                        }
                    });

                    let waypoints = units.filter(u => u.type === 'WAYPOINT');
                    units.forEach(u => {
                        if (u.team === TEAMS.MONGOL && u.targetable && u.type !== 'COMMANDER' && u.type !== 'GENGHIS') {
                            let closestWp = null;
                            let minDist = 4.5;
                            waypoints.forEach(wp => {
                                let d = u.mesh.position.distanceTo(wp.mesh.position);
                                if (d < minDist) { minDist = d; closestWp = wp; }
                            });
                            if (closestWp) u.currentWaypoint = closestWp;
                        }
                    });

                    waypoints.forEach(wp => {
                        wp.mesh.children.forEach(c => { if (c.material) c.material.opacity = 0.2; });
                        if (wp.incomingLine) wp.incomingLine.material.opacity = 0.15;
                    });

                    gameState = GAME_STATES.SIMULATION; document.getElementById('game-status').innerText = "PHASE: WAR ENGAGED"; document.getElementById('game-status').style.color = '#ffb703';
                    document.getElementById('btn-start').style.display = 'none'; if(centerDivider) scene.remove(centerDivider);
                    
                    document.getElementById('btn-undo').classList.add('disabled'); document.getElementById('btn-redo').classList.add('disabled');
                }
            });
            document.getElementById('btn-next').addEventListener('click', () => { currentLevelIdx++; saveProgressToBrowser(); loadLevel(currentLevelIdx); });
            document.getElementById('btn-clear').addEventListener('click', () => { loadLevel(currentLevelIdx); });
            document.getElementById('btn-wipe').addEventListener('click', () => { if(confirm("Wipe layout data progress and restart global campaign?")) { localStorage.clear(); currentLevelIdx = 0; loadLevel(0); } });
            window.addEventListener('contextmenu', e => e.preventDefault());
        }

        function evaluateSimulationOutcomes() {
            let mCount = 0; let cCount = 0; let genghisAlive = false;
            for (let i = 0; i < units.length; i++) {
                if (units[i].alive && units[i].targetable) {
                    if (units[i].team === TEAMS.MONGOL) { mCount++; if(units[i].type === 'GENGHIS') genghisAlive = true; }
                    else cCount++;
                }
            }
            
            document.getElementById('counter-horde').innerText = mCount; document.getElementById('counter-dynasty').innerText = cCount;

            if (gameState !== GAME_STATES.SIMULATION) return;

            if (!genghisAlive) { gameState = GAME_STATES.DEFEAT; document.getElementById('game-status').innerText = "DEFEAT: GENGHIS HAS FALLEN!"; document.getElementById('game-status').style.color = '#e63946'; return; }

            if (cCount === 0 && mCount > 0) {
                if(currentLevelIdx === 99) {
                    gameState = GAME_STATES.VICTORY; document.getElementById('game-status').innerText = "CAMPAIGN CONQUERED!"; saveProgressToBrowser();
                    const toast = document.getElementById('unlock-toast'); toast.style.display = 'block'; setTimeout(() => { toast.style.display = 'none'; }, 6000); currentLevelIdx = 0;
                } else {
                    gameState = GAME_STATES.VICTORY; document.getElementById('game-status').innerText = "VICTORY: EMPIRE OUTPOST CRUSHED!"; document.getElementById('game-status').style.color = '#ffd700'; document.getElementById('btn-next').style.display = 'block';
                }
            } else if (mCount === 0 && cCount > 0) {
                gameState = GAME_STATES.DEFEAT; document.getElementById('game-status').innerText = "DEFEAT: HORDE RETREATS!"; document.getElementById('game-status').style.color = '#e63946';
            }
        }

        // --- GHOST PATH 2D OVERLAY SETUP ---
        let ghostCanvas, ghostCtx;
        function setupGhostCanvas() {
            ghostCanvas = document.createElement('canvas');
            ghostCanvas.id = 'ghost-canvas';
            ghostCanvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;';
            ghostCanvas.width = window.innerWidth;
            ghostCanvas.height = window.innerHeight;
            document.body.appendChild(ghostCanvas);
            ghostCtx = ghostCanvas.getContext('2d');
            window.addEventListener('resize', () => {
                ghostCanvas.width = window.innerWidth;
                ghostCanvas.height = window.innerHeight;
            });
        }

        const deltaClock = new THREE.Clock();
        let frameCount = 0;

        function animate() {
            requestAnimationFrame(animate);
            const dt = deltaClock.getDelta();
            const timeTicks = performance.now();
            frameCount++;

            // Distributed AI Updates (Time-Slicing) — update all non-AI units every frame, 
            // split combat AI units across odd/even frames
            aiFrameToggle = !aiFrameToggle;
            for (let i = 0; i < units.length; i++) {
                let u = units[i];
                if (!u.alive) continue;
                // Always update if it's a non-combat unit, or Genghis, or it's our AI frame
                if (u.type === 'TARGET_MARK' || u.type === 'WAYPOINT' || u.type === 'GENGHIS') {
                    u.update(dt, timeTicks);
                } else {
                    // Time-slice: even index on even frames, odd index on odd frames
                    if ((i % 2 === 0) === aiFrameToggle) {
                        u.update(dt, timeTicks);
                    } else {
                        // Still run animations + HP bar facing even on skipped AI frames
                        u.processAnimations(dt, timeTicks);
                        const hpBg = u.mesh.getObjectByName("hpBg"); const hpFg = u.mesh.getObjectByName("hpFg");
                        if (hpBg && hpFg) { hpBg.quaternion.copy(camera.quaternion); hpFg.quaternion.copy(camera.quaternion); }
                    }
                }
            }

            for (let i = projectiles.length - 1; i >= 0; i--) { projectiles[i].update(); if (!projectiles[i].alive) projectiles.splice(i, 1); }
            updateFXSystems();
            evaluateSimulationOutcomes();

            // Ghost path overlay
            if (ghostCtx) drawGhostPathPreview(ghostCanvas, ghostCtx);

            renderer.render(scene, camera);
        }

        window.onload = function() {
            init();
            setupGhostCanvas();
        };
    </script>
</body>
