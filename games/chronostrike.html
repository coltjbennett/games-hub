const NORMAL_TIME_SCALE = 1.0;

function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

function makeCanvasTexture(size, drawFn, repeatX = 1, repeatY = 1) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  drawFn(ctx, size);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(repeatX, repeatY);
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy ? renderer.capabilities.getMaxAnisotropy() : 4;
  return tex;
}

function makeFloorTexture() {
  return makeCanvasTexture(256, (ctx, s) => {
    ctx.fillStyle = '#f2f2f2'; ctx.fillRect(0,0,s,s);
    for (let y = 0; y < s; y += 16) {
      for (let x = 0; x < s; x += 16) {
        ctx.fillStyle = ((x + y) / 16) % 2 === 0 ? '#ececec' : '#f7f7f7';
        ctx.fillRect(x, y, 16, 16);
      }
    }
    ctx.strokeStyle = 'rgba(160,160,160,0.24)';
    ctx.lineWidth = 2;
    for (let i = 0; i <= s; i += 32) {
      ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(s, i); ctx.stroke();
    }
    for (let i=0;i<2200;i++){
      const x = Math.random()*s, y = Math.random()*s;
      const a = Math.random()*0.06 + 0.01;
      ctx.fillStyle = `rgba(120,120,120,${a})`;
      ctx.fillRect(x, y, 1, 1);
    }
  }, 14, 14);
}

function makeWallTexture() {
  return makeCanvasTexture(256, (ctx, s) => {
    const grad = ctx.createLinearGradient(0,0,s,s);
    grad.addColorStop(0, '#d7d7d7');
    grad.addColorStop(1, '#c7c7c7');
    ctx.fillStyle = grad; ctx.fillRect(0,0,s,s);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    for (let y = 0; y < s; y += 32) {
      ctx.beginPath(); ctx.moveTo(0, y + 0.5); ctx.lineTo(s, y + 0.5); ctx.stroke();
    }
    ctx.strokeStyle = 'rgba(120,120,120,0.18)';
    for (let x = 0; x < s; x += 16) {
      ctx.beginPath(); ctx.moveTo(x + 0.5, 0); ctx.lineTo(x + 0.5, s); ctx.stroke();
    }
    for (let i=0;i<300;i++){
      const x = Math.random()*s, y = Math.random()*s;
      const r = Math.random()*9 + 2;
      ctx.fillStyle = `rgba(130,130,130,${Math.random()*0.08})`;
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
    }
  }, 6, 4);
}

function makeMetalTexture() {
  return makeCanvasTexture(256, (ctx, s) => {
    const g = ctx.createLinearGradient(0,0,s,0);
    g.addColorStop(0, '#151515');
    g.addColorStop(0.5, '#343434');
    g.addColorStop(1, '#141414');
    ctx.fillStyle = g; ctx.fillRect(0,0,s,s);
    for (let i=0;i<s;i++) {
      const v = 20 + Math.sin(i * 0.28) * 8 + Math.random() * 5;
      ctx.fillStyle = `rgba(${v},${v},${v},0.08)`;
      ctx.fillRect(0, i, s, 1);
    }
    for (let i=0;i<1800;i++){
      const x = Math.random()*s, y = Math.random()*s;
      const a = Math.random()*0.18;
      ctx.fillStyle = `rgba(255,255,255,${a})`;
      ctx.fillRect(x, y, 1, 1);
    }
  }, 1, 1);
}

function makeOrangeTexture() {
  return makeCanvasTexture(256, (ctx, s) => {
    const g = ctx.createLinearGradient(0,0,s,s);
    g.addColorStop(0, '#ff7e20');
    g.addColorStop(0.5, '#ff4d00');
    g.addColorStop(1, '#b02a00');
    ctx.fillStyle = g; ctx.fillRect(0,0,s,s);
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    for (let y = 0; y < s; y += 20) ctx.fillRect(0, y, s, 4);
    ctx.fillStyle = 'rgba(255,220,180,0.22)';
    for (let i=0;i<120;i++){
      const x = Math.random()*s, y = Math.random()*s;
      ctx.fillRect(x, y, 4, 18);
    }
  }, 1, 1);
}

function makeGripTexture() {
  return makeCanvasTexture(128, (ctx, s) => {
    ctx.fillStyle = '#2b2118'; ctx.fillRect(0,0,s,s);
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    for (let y = 0; y < s; y += 6) ctx.fillRect(0, y, s, 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    for (let x = 0; x < s; x += 10) {
      ctx.beginPath(); ctx.moveTo(x + 0.5, 0); ctx.lineTo(x + 0.5, s); ctx.stroke();
    }
  }, 1, 1);
}

const floorTexture = makeFloorTexture();
const wallTexture = makeWallTexture();
const metalTexture = makeMetalTexture();
const orangeTexture = makeOrangeTexture();
const gripTexture = makeGripTexture();

window.addEventListener('keydown', (e) => {
  keys[e.code] = true;
  if (e.code === 'Space') jump();
  if (e.code === 'KeyF') { fireHeld = true; fire(); }
  if (e.code === 'KeyR') startReload();
  if (e.code === 'Digit1') setWeapon('PISTOL');
  if (e.code === 'Digit2') setWeapon('SHOTGUN');
  if (e.code === 'Digit3') setWeapon('UZI');
  if (e.code === 'Digit4') setWeapon('KNIFE');
});

window.addEventListener('keyup', (e) => {
  keys[e.code] = false;
  if (e.code === 'KeyF') fireHeld = false;
});

function applyLookDelta(dx, dy, scale = 0.0048) {
  player.rot.y -= dx * scale;
  player.rot.x -= dy * scale;
  player.rot.x = clamp(player.rot.x, -1.4, 1.4);
}

window.addEventListener('mousedown', (e) => {
  if (e.button !== 0) return;
  mouseLook = true;
  mouseLastX = e.clientX;
  mouseLastY = e.clientY;
});
window.addEventListener('mousemove', (e) => {
  if (!mouseLook) return;
  applyLookDelta(e.clientX - mouseLastX, e.clientY - mouseLastY, 0.0045);
  mouseLastX = e.clientX;
  mouseLastY = e.clientY;
});
window.addEventListener('mouseup', () => { mouseLook = false; });

function setMoveFromPointer(clientX, clientY) {
  const dx = clientX - pointerState.moveCenterX;
  const dy = clientY - pointerState.moveCenterY;
  const dist = Math.min(Math.hypot(dx, dy), JOY_RADIUS);
  const ang = Math.atan2(dy, dx);
  moveData.x = (Math.cos(ang) * dist) / JOY_RADIUS;
  moveData.y = (Math.sin(ang) * dist) / JOY_RADIUS;
  joyKnob.style.transform = `translate(${moveData.x * 30}px, ${moveData.y * 30}px)`;
}

function resetMoveStick() {
  moveData.x = 0;
  moveData.y = 0;
  joyKnob.style.transform = 'translate(0,0)';
}

const joystick = document.getElementById('joystick-container');
joystick.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  if (pointerState.moveId !== null) return;
  pointerState.moveId = e.pointerId;
  joystick.setPointerCapture(e.pointerId);
  const r = joystick.getBoundingClientRect();
  pointerState.moveCenterX = r.left + r.width / 2;
  pointerState.moveCenterY = r.top + r.height / 2;
  setMoveFromPointer(e.clientX, e.clientY);
});
joystick.addEventListener('pointermove', (e) => {
  if (e.pointerId !== pointerState.moveId) return;
  setMoveFromPointer(e.clientX, e.clientY);
});
function endMovePointer(e){
  if (e.pointerId !== pointerState.moveId) return;
  pointerState.moveId = null;
  resetMoveStick();
}
joystick.addEventListener('pointerup', endMovePointer);
joystick.addEventListener('pointercancel', endMovePointer);
joystick.addEventListener('lostpointercapture', () => {
  pointerState.moveId = null;
  resetMoveStick();
});

document.addEventListener('pointerdown', (e) => {
  if (e.target.closest && e.target.closest('.btn')) return;
  if (e.pointerType === 'mouse' && e.button !== 0) return;
  const half = window.innerWidth / 2;
  if (e.clientX < half) {
    if (pointerState.moveId !== null) return;
    pointerState.moveId = e.pointerId;
    pointerState.moveCenterX = e.clientX;
    pointerState.moveCenterY = e.clientY;
    setMoveFromPointer(e.clientX, e.clientY);
  } else {
    if (pointerState.lookId !== null) return;
    pointerState.lookId = e.pointerId;
    pointerState.lookLastX = e.clientX;
    pointerState.lookLastY = e.clientY;
  }
}, { passive:true });

document.addEventListener('pointermove', (e) => {
  if (e.pointerId === pointerState.moveId && e.target !== joystick) {
    setMoveFromPointer(e.clientX, e.clientY);
  }
  if (e.pointerId === pointerState.lookId) {
    applyLookDelta(e.clientX - pointerState.lookLastX, e.clientY - pointerState.lookLastY, 0.006);
    pointerState.lookLastX = e.clientX;
    pointerState.lookLastY = e.clientY;
  }
}, { passive:true });

document.addEventListener('pointerup', (e) => {
  if (e.pointerId === pointerState.moveId) {
    pointerState.moveId = null;
    resetMoveStick();
  }
  if (e.pointerId === pointerState.lookId) {
    pointerState.lookId = null;
  }
  if (e.pointerId === pointerState.fireId) {
    pointerState.fireId = null;
    fireHeld = false;
  }
});
document.addEventListener('pointercancel', (e) => {
  if (e.pointerId === pointerState.moveId) { pointerState.moveId = null; resetMoveStick(); }
  if (e.pointerId === pointerState.lookId) pointerState.lookId = null;
  if (e.pointerId === pointerState.fireId) { pointerState.fireId = null; fireHeld = false; }
});

const shootBtn = document.getElementById('shoot-btn');
const jumpBtn = document.getElementById('jump-btn');

shootBtn.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  fireHeld = true;
  pointerState.fireId = e.pointerId;
  pointerState.fireLastX = e.clientX;
  pointerState.fireLastY = e.clientY;

shootBtn.addEventListener('pointermove', (e) => {
  if (e.pointerId !== pointerState.fireId) return;
  applyLookDelta(e.clientX - pointerState.fireLastX, e.clientY - pointerState.fireLastY, 0.006);
  pointerState.fireLastX = e.clientX;
  pointerState.fireLastY = e.clientY;
});
shootBtn.addEventListener('pointerup', () => { fireHeld = false; pointerState.fireId = null; });
shootBtn.addEventListener('pointercancel', () => { fireHeld = false; pointerState.fireId = null; });

jumpBtn.addEventListener('pointerdown', (e) => {

}, { passive:false });

  resetMoveStick();
  mouseLook = false;
  fireHeld = false;
  pointerState.moveId = null;
  pointerState.lookId = null;
  pointerState.fireId = null;
  for (const k in keys) keys[k] = false;
});

function showMessage(text, duration = 1200) {
  clearTimeout(messageTimer);
  ui.levelMsg.textContent = text;
  ui.levelMsg.style.display = 'block';
  messageTimer = setTimeout(() => { ui.levelMsg.style.display = 'none'; }, duration);
}

function updateUI() {
  ui.weaponName.textContent = player.weapon;
  ui.levelVal.textContent = currentLevel;
  ui.enemyVal.textContent = enemies.length;
  if (player.weapon === 'KNIFE') {
    ui.ammoBar.textContent = '∞';
    ui.reloadBtn.style.opacity = '0.4';
  } else if (player.isReloading) {
    ui.ammoBar.textContent = `RELOADING ${Math.max(0, player.reloadTimeRemaining).toFixed(1)}s`;
    ui.reloadBtn.style.opacity = '0.7';
  } else {
    const maxAmmo = weaponStats[player.weapon].maxAmmo;
    ui.ammoBar.textContent = `${player.ammo}/${maxAmmo}`;
    ui.reloadBtn.style.opacity = player.ammo >= maxAmmo ? '0.45' : '1';
  }
  ui.healthBar.style.width = `${Math.max(0, player.health)}%`;
  if (player.health > 65) ui.healthBar.style.background = '#55ff55';
  else if (player.health > 35) ui.healthBar.style.background = '#ffcc44';
  else ui.healthBar.style.background = '#ff5555';
}

function setWeapon(type, refillAmmo = true) {
  player.weapon = type;
  player.isReloading = false;
  player.reloadTimeRemaining = 0;
  player.ammo = type === 'KNIFE' ? 0 : (refillAmmo ? weaponStats[type].maxAmmo : Math.min(player.ammo, weaponStats[type].maxAmmo));
  updateWeaponView();
  updateUI();
}

function startReload() {
  if (gameState !== 'playing' || player.weapon === 'KNIFE' || player.isReloading) return;
  const stat = weaponStats[player.weapon];
  const missing = stat.maxAmmo - player.ammo;
  if (missing <= 0) return;
  player.isReloading = true;
  player.reloadTimeRemaining = stat.regenDelay * missing;
  updateUI();
}

function getMovementStrength() {
  const keyX = (keys['KeyD'] ? 1 : 0) - (keys['KeyA'] ? 1 : 0);
  const keyY = (keys['KeyS'] ? 1 : 0) - (keys['KeyW'] ? 1 : 0);
  const joy = Math.hypot(moveData.x, moveData.y);
  const kb = Math.hypot(keyX, keyY);
  return clamp(Math.max(joy, kb), 0, 1);
}

function getTimeScale(nowRealTime, movementStrength) {
  const shotGrace = (nowRealTime - player.lastShotRealTime) < SHOT_NORMAL_DURATION;
  const jumpNormal = !player.onGround && player.jumpNormalUntilLand;
  const rising = player.vel.y > 0.05;
  if (movementStrength > 0.02 || shotGrace || jumpNormal || rising) return NORMAL_TIME_SCALE;
  return SLOW_MO_TIME_SCALE + (NORMAL_TIME_SCALE - SLOW_MO_TIME_SCALE) * Math.pow(movementStrength, 0.8);
}

function isBlockedByWall(from, to) {
  tempVec.subVectors(to, from);
  const dist = tempVec.length();
  if (dist <= 0.0001) return false;
  raycaster.set(from, tempVec.normalize());
  raycaster.far = dist;
  return raycaster.intersectObjects(wallMeshes, false).length > 0;
}

function segmentIntersectsSphere(a, b, center, radius) {
  const ab = tempVec.subVectors(b, a);
  const ac = center.clone().sub(a);
  const abLenSq = ab.lengthSq();
  if (abLenSq <= 0.000001) return a.distanceToSquared(center) <= radius * radius;
  let t = ac.dot(ab) / abLenSq;
  t = clamp(t, 0, 1);
  const closest = a.clone().addScaledVector(ab, t);
  return closest.distanceToSquared(center) <= radius * radius;
}

function boxIntersectsAnyWall(box) {
  for (const w of walls) if (box.intersectsBox(w.box)) return true;
  return false;
}

function canPlaceAt(center, size) {
  const box = new THREE.Box3().setFromCenterAndSize(center, size);
  return !boxIntersectsAnyWall(box);
}

function moveWithCollision(startPos, step, size, heightOffset = 0) {
  const next = startPos.clone().add(step);
  const center = next.clone().add(new THREE.Vector3(0, heightOffset, 0));
  if (canPlaceAt(center, size)) return next;
  const xOnly = startPos.clone().add(new THREE.Vector3(step.x, 0, 0));
  if (canPlaceAt(xOnly.clone().add(new THREE.Vector3(0, heightOffset, 0)), size)) return xOnly;
  const zOnly = startPos.clone().add(new THREE.Vector3(0, 0, step.z));
  if (canPlaceAt(zOnly.clone().add(new THREE.Vector3(0, heightOffset, 0)), size)) return zOnly;
  return startPos.clone();
}

function disposeObject3D(object3d) {
  if (!object3d) return;
  object3d.traverse((child) => {
    if (child.geometry) child.geometry.dispose();
    if (child.material) {
      if (Array.isArray(child.material)) child.material.forEach((m) => m.dispose());
      else child.material.dispose();
    }
  });
}

function removeAndDispose(obj) {
  if (!obj) return;
  scene.remove(obj);
  disposeObject3D(obj);
}

function createWeaponModel(type) {
  const group = new THREE.Group();
  group.rotation.y = Math.PI / 2;

  if (type === 'PISTOL') {
    const mat = new THREE.MeshStandardMaterial({ map: metalTexture, color: 0x555555, metalness: 0.35, roughness: 0.7 });
    const darkMat = new THREE.MeshStandardMaterial({ map: metalTexture, color: 0x222222, metalness: 0.15, roughness: 0.92 });
    const grip = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.25, 0.18), mat);
    const slide = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.09, 0.13), mat);
    const barrel = new THREE.Mesh(new THREE.BoxGeometry(0.19, 0.04, 0.04), darkMat);
    const trigger = new THREE.Mesh(new THREE.TorusGeometry(0.035, 0.008, 8, 14), darkMat);
    const sight = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.02, 0.05), darkMat);
    const muzzleAnchor = new THREE.Object3D();
    grip.position.set(0, -0.06, 0);
    slide.position.set(0.02, 0.05, 0);
    barrel.position.set(0.13, 0.03, 0);
    trigger.rotation.z = Math.PI / 2;
    trigger.position.set(0.01, -0.04, 0.06);
    sight.position.set(0.02, 0.1, 0);
    muzzleAnchor.position.set(0.23, 0.03, 0);
    group.add(grip, slide, barrel, trigger, sight, muzzleAnchor);
    group.userData.muzzleAnchor = muzzleAnchor;
  } else if (type === 'SHOTGUN') {
    const mat = new THREE.MeshStandardMaterial({ map: metalTexture, color: 0x484848, metalness: 0.2, roughness: 0.8 });
    const stock = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.18, 0.23), new THREE.MeshStandardMaterial({ map: gripTexture, color: 0x5a4028, roughness: 0.95, metalness: 0.02 }));
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.68, 0.11, 0.12), mat);
    const barrel = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.045, 0.05), mat);
    const pump = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.09, 0.14), new THREE.MeshStandardMaterial({ map: metalTexture, color: 0x3a3a3a, metalness: 0.16, roughness: 0.82 }));
    const muzzleAnchor = new THREE.Object3D();
    stock.position.set(-0.27, -0.02, 0);
    body.position.set(0.05, 0.05, 0);
    barrel.position.set(0.34, 0.09, 0);
    pump.position.set(0.03, 0.00, 0);
    muzzleAnchor.position.set(0.46, 0.08, 0);
    group.add(stock, body, barrel, pump, muzzleAnchor);
    group.userData.muzzleAnchor = muzzleAnchor;
  } else if (type === 'UZI') {
    const mat = new THREE.MeshStandardMaterial({ map: metalTexture, color: 0x555555, metalness: 0.3, roughness: 0.72 });
    const gripMat = new THREE.MeshStandardMaterial({ map: gripTexture, color: 0x1a1a1a, metalness: 0.08, roughness: 0.95 });
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.16, 0.18), mat);
    const barrel = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.05, 0.05), mat);
    const grip = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.19, 0.10), gripMat);
    const mag = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.22, 0.08), gripMat);
    const muzzleAnchor = new THREE.Object3D();
    body.position.set(0.05, 0.04, 0);
    barrel.position.set(0.24, 0.05, 0);
    grip.position.set(0.02, -0.08, 0);
    mag.position.set(0.01, -0.19, 0);
    muzzleAnchor.position.set(0.28, 0.05, 0);
    group.add(body, barrel, grip, mag, muzzleAnchor);
    group.userData.muzzleAnchor = muzzleAnchor;
  } else if (type === 'KNIFE') {
    const bladeMat = new THREE.MeshStandardMaterial({ map: metalTexture, color: 0xe8e8e8, metalness: 0.72, roughness: 0.2 });
    const handleMat = new THREE.MeshStandardMaterial({ map: gripTexture, color: 0x332211, metalness: 0.08, roughness: 0.96 });
    const guardMat = new THREE.MeshStandardMaterial({ map: metalTexture, color: 0x777777, metalness: 0.35, roughness: 0.5 });
    const blade = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.10, 0.58), bladeMat);
    const handle = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.07, 0.16), handleMat);
    const guard = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.02, 0.06), guardMat);
    blade.position.set(0.04, 0.03, 0);
    handle.position.set(-0.02, -0.03, 0);
    guard.position.set(0.01, 0.01, 0);
    group.add(blade, handle, guard);
  }

  group.traverse((c) => { c.frustumCulled = false; });
  return group;
}

function createPickupModel(type) {
  const group = new THREE.Group();
  if (type === 'MEDKIT') {
    const box = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.35, 0.45), new THREE.MeshStandardMaterial({ color: 0xcc2222, roughness: 0.72, metalness: 0.04 }));
    const crossV = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.24, 0.08), new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.45, metalness: 0 }));
    const crossH = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.12, 0.08), new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.45, metalness: 0 }));
    crossV.position.y = 0.01; crossH.position.y = 0.01;
    group.add(box, crossV, crossH);
  } else {
    const weapon = createWeaponModel(type);
    weapon.scale.set(0.8, 0.8, 0.8);
    group.add(weapon);
  }
  return group;
}

function updateWeaponView() {
  if (gunView) {
    camera.remove(gunView);
    disposeObject3D(gunView);
  }
  gunView = new THREE.Group();
  gunView.renderOrder = 1000;
  gunView.frustumCulled = false;

  const model = createWeaponModel(player.weapon);
  const flashMat = new THREE.MeshBasicMaterial({ color: 0xfff1bf, transparent: true, opacity: 0.95, depthWrite:false });
  const flashGeo = new THREE.ConeGeometry(0.08, 0.28, 5);
  const flashMesh = new THREE.Mesh(flashGeo, flashMat);
  flashMesh.rotation.z = Math.PI / 2;
  flashMesh.visible = false;
  const flashLight = new THREE.PointLight(0xfff2c7, 0, 2.2, 2);
  flashLight.visible = false;

  const anchor = model.userData && model.userData.muzzleAnchor ? model.userData.muzzleAnchor : null;
  if (anchor) {
    anchor.add(flashMesh);
    anchor.add(flashLight);
    flashMesh.position.set(0.13, 0, 0);
    flashLight.position.set(0.12, 0, 0);
  } else {
    gunView.add(flashMesh);
    gunView.add(flashLight);
    flashMesh.position.set(0.2, 0.02, 0);
    flashLight.position.set(0.18, 0.02, 0);
  }

  gunView.add(model);
  gunView.position.set(0.66, -0.54, -0.88);
  gunView.rotation.set(0.03, -0.14, 0.08);
  gunView.userData.model = model;
  gunView.userData.flashMesh = flashMesh;
  gunView.userData.flashLight = flashLight;
  gunView.userData.flashTimer = 0;
  gunView.userData.flashScale = 1;
  camera.add(gunView);
  camera.updateMatrixWorld(true);
}

function triggerWeaponFX() {
  if (!gunView || player.weapon === 'KNIFE') return;
  gunView.userData.flashTimer = player.weapon === 'SHOTGUN' ? 0.09 : 0.045;
  gunView.userData.flashScale = player.weapon === 'SHOTGUN' ? 1.7 : 1.0;
  player.weaponKick = player.weapon === 'SHOTGUN' ? 1.7 : (player.weapon === 'UZI' ? 0.65 : 0.9);
}

function updateWeaponAnimation(dt) {
  if (!gunView) return;
  const moving = getMovementStrength() > 0.08 ? 1 : 0;
  player.weaponBobPhase += dt * (moving ? 13 : 7);
  player.weaponKick = Math.max(0, player.weaponKick - dt * 12);
  const kick = player.weaponKick;
  const bobX = Math.sin(player.weaponBobPhase * 0.55) * 0.015 * moving;
  const bobY = Math.abs(Math.cos(player.weaponBobPhase * 1.1)) * 0.02 * moving;
  const swayX = (moveData.x + (keys['KeyD'] ? 1 : 0) - (keys['KeyA'] ? 1 : 0)) * 0.03;
  const swayY = (moveData.y + (keys['KeyS'] ? 1 : 0) - (keys['KeyW'] ? 1 : 0)) * 0.02;
  gunView.position.set(0.66 + bobX + swayX * 0.3, -0.54 - bobY + swayY * 0.15 - kick * 0.03, -0.88 + kick * 0.12);
  gunView.rotation.set(0.03 - kick * 0.12, -0.14 + swayX * 0.7, 0.08 + Math.sin(player.weaponBobPhase * 0.65) * 0.02 * moving - kick * 0.15);

  const flashMesh = gunView.userData.flashMesh;
  const flashLight = gunView.userData.flashLight;
  if (gunView.userData.flashTimer > 0) {
    gunView.userData.flashTimer -= dt;
    const pulse = Math.max(0, gunView.userData.flashTimer);
    const scale = gunView.userData.flashScale * (0.75 + pulse * 7);
    flashMesh.visible = true;
    flashLight.visible = true;
    flashMesh.scale.setScalar(scale);
    flashLight.intensity = 2.6 + scale * 2.4;
  } else {
    flashMesh.visible = false;
    flashLight.visible = false;
    flashLight.intensity = 0;
  }
}

function spawnPickup(pos, type) {
  const mesh = createPickupModel(type);
  mesh.position.copy(pos);
  mesh.position.y = 0.55;
  scene.add(mesh);
  pickups.push({ mesh, type, baseY:0.55, spin:Math.random()*Math.PI*2, bob:Math.random()*Math.PI*2 });
}

function clearLevel() {
  if (gunView) {
    camera.remove(gunView);
    disposeObject3D(gunView);
    gunView = null;
  }
  while (worldObjects.length) removeAndDispose(worldObjects.pop());
  while (pickups.length) removeAndDispose(pickups.pop().mesh);
  while (enemies.length) removeAndDispose(enemies.pop().mesh);
  while (bullets.length) removeAndDispose(bullets.pop().mesh);
  walls.length = 0;
  wallMeshes.length = 0;
}

function createFloor() {
  const floorMat = new THREE.MeshStandardMaterial({ map: floorTexture, color: 0xffffff, roughness:1, metalness:0 });
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(120, 120), floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);
  worldObjects.push(floor);
}

function addWall(x, y, z, w, h, d, color = 0xd7d7d7) {
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshStandardMaterial({ map: wallTexture, color, roughness:0.92, metalness:0.03 })
  );
  mesh.position.set(x, h / 2, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  const box = new THREE.Box3().setFromObject(mesh);
  walls.push({ mesh, box });
  wallMeshes.push(mesh);
  worldObjects.push(mesh);
}

function tryAddRandomWall(w, h, d, x, z) {
  const box = new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(x, h/2, z), new THREE.Vector3(w, h, d));
  if (box.intersectsBox(PLAYER_START_BOX)) return false;
  if (boxIntersectsAnyWall(box)) return false;
  addWall(x, h/2, z, w, h, d);
  return true;
}

function validEnemySpawnPosition(x, z) {
  const center = new THREE.Vector3(x, 0, z);
  const box = new THREE.Box3().setFromCenterAndSize(center, new THREE.Vector3(0.9, 1.8, 0.9));
  if (box.intersectsBox(PLAYER_START_BOX)) return false;
  if (boxIntersectsAnyWall(box)) return false;
  for (const e of enemies) {
    if (e.dead) continue;
    if (e.mesh.position.distanceTo(center) < 2.0) return false;
  }
  return true;
}

function createEnemy(x, z, level) {
  const role = Math.random() < 0.38 ? 'rusher' : 'shooter';
  const group = new THREE.Group();
  const bodyTex = orangeTexture;
  const headTex = orangeTexture;

  const bodyMat = new THREE.MeshStandardMaterial({
    map: bodyTex,
    color: role === 'rusher' ? 0xff7a18 : 0xff4400,
    emissive: role === 'rusher' ? 0x220b00 : 0x200000,
    metalness: 0.05,
    roughness: 0.72
  });
  const headMat = new THREE.MeshStandardMaterial({
    map: headTex,
    color: role === 'rusher' ? 0xffaa55 : 0xff6622,
    emissive: 0x180000,
    roughness: 0.66,
    metalness: 0.02
  });

  const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.4, 0.4), bodyMat);
  body.position.y = 0.7; body.castShadow = true;
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.42, 0.42), headMat);
  head.position.y = 1.5; head.castShadow = true;
  const eyeGlow = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffddaa }));
  eyeGlow.position.set(0.08, 1.52, 0.21);
  group.add(body, head, eyeGlow);
  group.position.set(x, 0, z);
  scene.add(group);

  enemies.push({
    mesh: group,
    hp: role === 'rusher' ? 65 : 80,
    role,
    speed: role === 'rusher' ? 3.2 + level * 0.08 : 2.1 + level * 0.06,
    strafeSpeed: role === 'rusher' ? 0.10 : 0.16,
    viewDist: role === 'rusher' ? 26 : 34,
    shootRange: role === 'rusher' ? 10 : 22,
    minRange: role === 'rusher' ? 2.5 : 8,
    engageRange: role === 'rusher' ? 9 : 16,
    fireRate: role === 'rusher' ? 1.9 : Math.max(1.8, 2.8 - level * 0.05),
    bulletSpeed: role === 'rusher' ? 18 : 17,
    accuracy: role === 'rusher' ? 0.10 : Math.max(0.02, 0.12 - level * 0.003),
    fireCooldown: 0.8 + Math.random() * 1.4,
    strafeDir: Math.random() > 0.5 ? 1 : -1,
    strafeTimer: 2.8 + Math.random() * 3.2,
    wanderTimer: 1.0 + Math.random() * 2.4,
    wanderAngle: Math.random() * Math.PI * 2,
    lastKnownPlayerPos: new THREE.Vector3(),
    dead: false,
    flashTimer: 0
  });
}

function initLevel() {
  clearTimeout(stateTimer);
  gameState = 'playing';
  clearLevel();
  updateWeaponView();
  createFloor();
  ui.levelVal.textContent = currentLevel;
  player.pos.copy(PLAYER_START_POS);
  player.prevPos.copy(PLAYER_START_POS);
  player.vel.set(0,0,0);
  player.linearVelocity.set(0,0,0);
  player.onGround = true;
  player.jumpNormalUntilLand = false;
  player.fireCooldown = 0;
  player.reloadTimeRemaining = 0;
  player.isReloading = false;
  player.weaponKick = 0;
  player.weaponBobPhase = 0;
  if (player.weapon !== 'KNIFE') player.ammo = weaponStats[player.weapon].maxAmmo;

  addWall(0, 2.0, -52, 104, 4, 1, 0xbbbbbb);
  addWall(0, 2.0, 52, 104, 4, 1, 0xbbbbbb);
  addWall(-52, 2.0, 0, 1, 4, 104, 0xbbbbbb);
  addWall(52, 2.0, 0, 1, 4, 104, 0xbbbbbb);

  const wallCount = 10 + currentLevel * 2;
  for (let i = 0; i < wallCount; i++) {
    let placed = false;
    for (let tries = 0; tries < 18 && !placed; tries++) {
      const w = Math.random() * 4 + 1.2;
      const h = Math.random() * 5 + 2;
      const d = Math.random() * 4 + 1.2;
      const x = (Math.random() - 0.5) * 34;
      const z = (Math.random() - 0.5) * 34;
      if (Math.abs(x) < 4 && Math.abs(z - 15) < 7) continue;
      placed = tryAddRandomWall(w, h, d, x, z);
    }
  }

  const enemyCount = 4 + currentLevel * 2;
  for (let i = 0; i < enemyCount; i++) {
    let x = 0, z = 0, tries = 0;
    do {
      x = (Math.random() - 0.5) * 42;
      z = (Math.random() - 0.5) * 42 - 6;
      tries++;
    } while (!validEnemySpawnPosition(x, z) && tries < 40);
    createEnemy(x, z, currentLevel);
  }

  camera.position.copy(player.pos);
  camera.quaternion.setFromEuler(player.rot);
  updateUI();
}

function nextLevel() {
  if (gameState !== 'playing') return;
  gameState = 'levelClear';
  showMessage('LEVEL CLEAR', 1200);
  clearTimeout(stateTimer);
  stateTimer = setTimeout(() => { currentLevel++; initLevel(); }, 1400);
}

function spawnBullet(origin, dir, fromPlayer, damage, speed, life) {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(fromPlayer ? BULLET_RADIUS : ENEMY_BULLET_RADIUS, 10, 10),
    new THREE.MeshBasicMaterial({ color: fromPlayer ? 0x222222 : 0xffaa00 })
  );
  mesh.position.copy(origin);
  scene.add(mesh);
  bullets.push({ mesh, prevPos: origin.clone(), vel: dir.clone().multiplyScalar(speed), fromPlayer, damage, life });
}

function damageEnemy(enemy, amount) {
  if (enemy.dead || gameState !== 'playing') return;
  enemy.hp -= amount;
  enemy.flashTimer = 0.08;
  enemy.mesh.scale.set(1.08,1.08,1.08);
  setTimeout(() => { if (!enemy.dead && enemy.mesh) enemy.mesh.scale.set(1,1,1); }, 35);
  if (enemy.hp <= 0) {
    enemy.dead = true;
    const idx = enemies.indexOf(enemy);
    if (idx !== -1) enemies.splice(idx, 1);
    removeAndDispose(enemy.mesh);
    const pos = enemy.mesh.position.clone();
    const roll = Math.random();
    if (roll < 0.24) spawnPickup(pos, 'UZI');
    else if (roll < 0.42) spawnPickup(pos, 'SHOTGUN');
    else if (roll < 0.56) spawnPickup(pos, 'MEDKIT');
    else if (roll < 0.72) spawnPickup(pos, 'PISTOL');
    if (enemies.length === 0) nextLevel();
  }
}

function hurtPlayer(amount) {
  if (gameState !== 'playing') return;
  player.health = Math.max(0, player.health - amount);
  updateUI();
  renderer.domElement.style.filter = 'invert(1)';
  setTimeout(() => { renderer.domElement.style.filter = 'none'; }, 50);
  if (player.health <= 0) {
    gameState = 'dead';
    showMessage('YOU DIED', 1500);
    clearTimeout(stateTimer);
    stateTimer = setTimeout(() => {
      currentLevel = 1;
      player.health = 100;
      player.weapon = 'PISTOL';
      player.ammo = weaponStats.PISTOL.maxAmmo;
      player.isReloading = false;
      player.reloadTimeRemaining = 0;
      initLevel();
      ui.levelMsg.style.display = 'none';
    }, 1600);
  }
}

function jump() {
  if (!player.onGround || gameState !== 'playing') return;
  player.vel.y = JUMP_VELOCITY;
  player.onGround = false;
  player.jumpNormalUntilLand = true;
}

function fire() {
  if (gameState !== 'playing') return;
  camera.position.copy(player.pos);
  camera.quaternion.setFromEuler(player.rot);
  const stat = weaponStats[player.weapon];
  if (player.fireCooldown > 0 || player.isReloading) return;
  if (player.weapon !== 'KNIFE' && player.ammo <= 0) return;

  const origin = camera.position.clone().add(camera.getWorldDirection(new THREE.Vector3()).multiplyScalar(0.85));
  const baseDir = camera.getWorldDirection(new THREE.Vector3());

  if (player.weapon === 'PISTOL' || player.weapon === 'UZI') {
    const dir = baseDir.clone();
    dir.x += (Math.random() - 0.5) * stat.spread;
    dir.y += (Math.random() - 0.5) * stat.spread;
    dir.z += (Math.random() - 0.5) * stat.spread;
    dir.normalize();
    spawnBullet(origin, dir, true, stat.damage, stat.bulletSpeed, 2.2);
    player.ammo -= stat.ammoUse;
  } else if (player.weapon === 'SHOTGUN') {
    for (let i = 0; i < stat.pellets; i++) {
      const dir = baseDir.clone();
      dir.x += (Math.random() - 0.5) * stat.spread;
      dir.y += (Math.random() - 0.5) * stat.spread;
      dir.z += (Math.random() - 0.5) * stat.spread;
      dir.normalize();
      spawnBullet(origin, dir, true, stat.damage, stat.bulletSpeed, 1.2);
    }
    player.ammo -= stat.ammoUse;
  } else if (player.weapon === 'KNIFE') {
    const knifeRange = 2.3;
    const playerEye = camera.position.clone();
    for (const enemy of enemies.slice()) {
      const enemyEye = enemy.mesh.position.clone().add(new THREE.Vector3(0, 1.0, 0));
      if (enemyEye.distanceTo(playerEye) <= knifeRange) damageEnemy(enemy, stat.damage);
    }
  }

  player.lastShotRealTime = performance.now() / 1000;
  player.fireCooldown = stat.fireDelay;
  triggerWeaponFX();
  updateUI();
}

function shootEnemyBullet(enemy, targetPos) {
  const from = enemy.mesh.position.clone().add(new THREE.Vector3(0, 1.1, 0));
  const dir = targetPos.clone().sub(from).normalize();
  dir.x += (Math.random() - 0.5) * enemy.accuracy;
  dir.y += (Math.random() - 0.5) * enemy.accuracy * 0.5;
  dir.z += (Math.random() - 0.5) * enemy.accuracy;
  dir.normalize();
  const damage = enemy.role === 'rusher' ? 9 : 12;
  spawnBullet(from, dir, false, damage, enemy.bulletSpeed, 2.5);
  enemy.fireCooldown = enemy.fireRate + Math.random() * 0.35;
}

function rotateVectorY(vec, angle) {
  const c = Math.cos(angle), s = Math.sin(angle);
  return new THREE.Vector3(vec.x * c - vec.z * s, 0, vec.x * s + vec.z * c);
}

function chooseEnemyStep(enemy, desired, dt, targetPos, seesPlayer) {
  const size = new THREE.Vector3(0.7, 1.7, 0.7);
  const base = desired.clone().setY(0);
  if (base.lengthSq() < 0.000001) return enemy.mesh.position.clone();
  base.normalize();
  const candidates = [0, 0.35, -0.35, 0.7, -0.7, 1.15, -1.15, Math.PI/2, -Math.PI/2, Math.PI];
  let bestPos = enemy.mesh.position.clone();
  let bestScore = -Infinity;
  for (const angle of candidates) {
    const dir = rotateVectorY(base, angle).normalize();
    const step = dir.clone().multiplyScalar(enemy.speed * dt);
    const nextPos = moveWithCollision(enemy.mesh.position, step, size, 0.85);
    if (nextPos.distanceToSquared(enemy.mesh.position) < 0.00001) continue;
    let score = dir.dot(base) * 2.0;
    const currentDist = enemy.mesh.position.distanceTo(targetPos);
    const nextDist = nextPos.distanceTo(targetPos);
    if (seesPlayer) {
      if (enemy.role === 'rusher') score += (currentDist - nextDist) * 4.0;
      else {
        score += (currentDist - nextDist) * 2.3;
        score -= Math.abs(nextDist - 14.0) * 0.25;
      }
    } else score += (currentDist - nextDist) * 3.0;
    if (score > bestScore) { bestScore = score; bestPos = nextPos; }
  }
  return bestPos;
}

function updateEnemy(enemy, dt) {
  if (enemy.dead) return;
  enemy.flashTimer = Math.max(0, enemy.flashTimer - dt);
  enemy.fireCooldown = Math.max(0, enemy.fireCooldown - dt);
  enemy.strafeTimer -= dt;
  enemy.wanderTimer -= dt;
  if (enemy.strafeTimer <= 0) {
    enemy.strafeTimer = 2.8 + Math.random() * 3.2;
    if (Math.random() < 0.28) enemy.strafeDir *= -1;
  }

  const enemyEye = enemy.mesh.position.clone().add(new THREE.Vector3(0, 1.05, 0));
  const playerEye = camera.position.clone();
  const toPlayer = playerEye.clone().sub(enemyEye);
  const dist = toPlayer.length();
  const seesPlayer = dist <= enemy.viewDist && !isBlockedByWall(enemyEye, playerEye);
  if (seesPlayer) enemy.lastKnownPlayerPos.copy(camera.position);

  const predictedPlayerPos = camera.position.clone().add(player.linearVelocity.clone().multiplyScalar(Math.min(0.35 + dist / 45, 0.9)));
  let desired = new THREE.Vector3();

  if (seesPlayer) {
    const target = predictedPlayerPos;
    const horizontal = new THREE.Vector3(target.x - enemy.mesh.position.x, 0, target.z - enemy.mesh.position.z);
    const hLen = horizontal.length() || 0.0001;
    const forward = horizontal.clone().divideScalar(hLen);
    const side = new THREE.Vector3(-forward.z, 0, forward.x).multiplyScalar(enemy.strafeDir);
    if (enemy.role === 'rusher') {
      if (dist > enemy.engageRange) desired.add(forward);
      else if (dist < enemy.minRange) desired.add(forward.clone().multiplyScalar(-1));
      else desired.add(forward).add(side.clone().multiplyScalar(0.08));
    } else {
      if (dist > enemy.engageRange) desired.add(forward);
      else if (dist < enemy.minRange) desired.add(forward.clone().multiplyScalar(-1)).add(side.clone().multiplyScalar(0.06));
      else {
        desired.add(side.clone().multiplyScalar(0.14));
        if (dist > 13) desired.add(forward.clone().multiplyScalar(0.08));
      }
    }
    if (dist < enemy.shootRange && enemy.fireCooldown <= 0) shootEnemyBullet(enemy, predictedPlayerPos);
  } else {
    const toLastSeen = enemy.lastKnownPlayerPos.clone().sub(enemy.mesh.position);
    const lastSeenDist = toLastSeen.length();
    if (lastSeenDist > 1.0) desired.add(toLastSeen.normalize());
    else {
      if (enemy.wanderTimer <= 0) {
        enemy.wanderTimer = 1.2 + Math.random() * 2.8;
        enemy.wanderAngle = Math.random() * Math.PI * 2;
      }
      desired.add(new THREE.Vector3(Math.cos(enemy.wanderAngle), 0, Math.sin(enemy.wanderAngle)));
    }
  }

  if (desired.lengthSq() < 0.0001) desired.set(Math.sin(enemy.wanderAngle), 0, Math.cos(enemy.wanderAngle));
  desired.y = 0;
  desired.normalize();
  const nextPos = chooseEnemyStep(enemy, desired, dt, seesPlayer ? predictedPlayerPos : enemy.lastKnownPlayerPos, seesPlayer);
  if (nextPos.distanceToSquared(enemy.mesh.position) > 0.00001) enemy.mesh.position.copy(nextPos);
  else enemy.wanderAngle += Math.PI / 2;
  const lookTarget = seesPlayer ? predictedPlayerPos : enemy.lastKnownPlayerPos;
  if (lookTarget && lookTarget.lengthSq() > 0.001) enemy.mesh.lookAt(lookTarget.x, enemy.mesh.position.y + 0.8, lookTarget.z);
}

function updatePlayerMovement(dt) {
  player.prevPos.copy(player.pos);
  let inputX = moveData.x;
  let inputY = moveData.y;
  const keyX = (keys['KeyD'] ? 1 : 0) - (keys['KeyA'] ? 1 : 0);
  const keyY = (keys['KeyS'] ? 1 : 0) - (keys['KeyW'] ? 1 : 0);
  inputX += keyX;
  inputY += keyY;
  const inputLen = Math.hypot(inputX, inputY);
  if (inputLen > 1) { inputX /= inputLen; inputY /= inputLen; }

  const forward = new THREE.Vector3(0,0,-1).applyEuler(tempEuler.set(0, player.rot.y, 0));
  const right = new THREE.Vector3(1,0,0).applyEuler(tempEuler.set(0, player.rot.y, 0));
  const moveStep = new THREE.Vector3()
    .addScaledVector(forward, -inputY * PLAYER_MOVE_SPEED * dt)
    .addScaledVector(right, inputX * PLAYER_MOVE_SPEED * dt);

  const nextPos = moveWithCollision(player.pos, moveStep, new THREE.Vector3(PLAYER_RADIUS * 2, PLAYER_HEIGHT, PLAYER_RADIUS * 2), -0.9);
  player.pos.copy(nextPos);

  player.vel.y += GRAVITY * dt;
  player.pos.y += player.vel.y * dt;
  if (player.pos.y <= PLAYER_EYE_HEIGHT) {
    player.pos.y = PLAYER_EYE_HEIGHT;
    player.vel.y = 0;
    player.onGround = true;
    player.jumpNormalUntilLand = false;
  } else {
    player.onGround = false;
  }

  player.linearVelocity.copy(player.pos).sub(player.prevPos).divideScalar(Math.max(dt, 0.001));
  player.pos.x = clamp(player.pos.x, -50, 50);
  player.pos.z = clamp(player.pos.z, -50, 50);
}

function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.life -= dt;
    b.prevPos.copy(b.mesh.position);
    b.mesh.position.addScaledVector(b.vel, dt);
    let hit = false;
    const segmentStart = b.prevPos;
    const segmentEnd = b.mesh.position;

    raycaster.set(segmentStart, tempVec.subVectors(segmentEnd, segmentStart).normalize());
    raycaster.far = segmentStart.distanceTo(segmentEnd);
    if (raycaster.intersectObjects(wallMeshes, false).length > 0) hit = true;

    if (!hit && b.fromPlayer) {
      for (let e = enemies.length - 1; e >= 0; e--) {
        const enemy = enemies[e];
        if (enemy.dead) continue;
        const enemyHitPoint = enemy.mesh.position.clone().add(new THREE.Vector3(0, 1.0, 0));
        if (segmentIntersectsSphere(segmentStart, segmentEnd, enemyHitPoint, 0.8)) {
          damageEnemy(enemy, b.damage);
          hit = true;
          break;
        }
      }
    }

    if (!hit && !b.fromPlayer) {
      const playerHitPoint = camera.position.clone();
      if (segmentIntersectsSphere(segmentStart, segmentEnd, playerHitPoint, 0.65)) {
        hurtPlayer(b.damage);
        hit = true;
      }
    }

    if (hit || b.life <= 0 || b.mesh.position.length() > 90) {
      removeAndDispose(b.mesh);
      bullets.splice(i, 1);
    }
  }
}

function updatePickups(dt) {
  for (let i = pickups.length - 1; i >= 0; i--) {
    const p = pickups[i];
    p.spin += dt * 1.4;
    p.bob += dt * 3.0;
    p.mesh.rotation.y = p.spin;
    p.mesh.position.y = p.baseY + Math.sin(p.bob) * 0.08;
    if (camera.position.distanceTo(p.mesh.position) < 1.6) {
      if (p.type === 'MEDKIT') player.health = Math.min(100, player.health + 35);
      else if (['PISTOL','SHOTGUN','UZI','KNIFE'].includes(p.type)) setWeapon(p.type, true);
      removeAndDispose(p.mesh);
      pickups.splice(i, 1);
      updateUI();
    }
  }
}

function updateReload(dt) {
  if (!player.isReloading) return;
  player.reloadTimeRemaining -= dt;
  if (player.reloadTimeRemaining <= 0) {
    player.isReloading = false;
    if (player.weapon !== 'KNIFE') player.ammo = weaponStats[player.weapon].maxAmmo;
    player.reloadTimeRemaining = 0;
    updateUI();
  }
}

function updateWeaponAndCamera() {
  camera.position.copy(player.pos);
  camera.quaternion.setFromEuler(player.rot);
}

function gameLoop() {
  const dtReal = Math.min(clock.getDelta(), 0.033);
  const nowRealTime = performance.now() / 1000;
  const movementStrength = getMovementStrength();
  const timeScale = (gameState === 'playing') ? getTimeScale(nowRealTime, movementStrength) : NORMAL_TIME_SCALE;
  const dt = dtReal * timeScale;

  if (gameState === 'playing') {
    player.fireCooldown = Math.max(0, player.fireCooldown - dt);
    updateReload(dt);
    updatePlayerMovement(dt);
    updateWeaponAndCamera();
    if (fireHeld && player.weapon === 'UZI' && !player.isReloading) fire();
    updateBullets(dt);
    updatePickups(dt);
    for (let i = enemies.length - 1; i >= 0; i--) updateEnemy(enemies[i], dt);
    updateUI();
  }

  const t = performance.now() / 1000;
  sun.position.x = 12 + Math.sin(t * 0.13) * 2;
  sun.position.z = 10 + Math.cos(t * 0.11) * 1.5;
  sun.intensity = 1.32 + Math.sin(t * 0.6) * 0.05;
  fill.intensity = 0.94 + Math.sin(t * 0.37) * 0.04;
  updateWeaponAnimation(dt);
  renderer.render(scene, camera);
  requestAnimationFrame(gameLoop);
}

function initGame() {
  updateWeaponView();
  initLevel();
  updateUI();
  gameLoop();
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

initGame();
</script>
