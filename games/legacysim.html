<!doctype html>
<html lang="en"> 
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
<title>Colton's Legacy Driving Sim</title>
<style>
  /* page layout */
  html,body{height:100%;margin:0;background:linear-gradient(#9bd8ff,#0b2940 65%);color:#111;font-family:ui-sans-serif,system-ui,Segoe UI,Roboto,Helvetica,Arial;display:flex;align-items:center;justify-content:center;}
  /* viewport is centered and locked to an aspect ratio (width-driven). JS controls its size. */
  #viewport { position:relative; background:transparent; overflow:hidden; }
  /* canvas fills viewport */
  canvas#gl{ display:block; width:100%; height:100%; background:transparent; }
  /* UI is positioned inside viewport */
  #ui { position:absolute; left:0; right:0; top:0; bottom:0; pointer-events:none; }
  .hud { pointer-events:auto; padding:10px 12px; background:rgba(0,0,0,0.25); margin:12px; border-radius:8px; max-width:420px; font-size:13px; color:#fff; backdrop-filter: blur(6px); }
  .meter { font-family:monospace; background:rgba(255,255,255,0.06); padding:6px 8px; border-radius:6px; color:#fff; display:inline-block; vertical-align:middle; }
  .controls-left { position:absolute; left:12px; bottom:12px; pointer-events:auto; display:flex; flex-direction:column; gap:12px; align-items:flex-start; }
  .controls-right { position:absolute; right:12px; bottom:12px; pointer-events:auto; display:flex; flex-direction:column; gap:12px; align-items:flex-end; }
  .joystick { width:140px; height:140px; border-radius:12px; background:rgba(255,255,255,0.04); display:flex; align-items:center; justify-content:center; border:1px solid rgba(255,255,255,0.06); touch-action:none; }
  .stick { width:64px; height:64px; border-radius:50%; background:rgba(255,255,255,0.12); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; touch-action:none; }
  .stack { display:flex; flex-direction:column; gap:10px; align-items:center; }
  .big-btn { width:86px; height:86px; border-radius:14px; background:rgba(255,255,255,0.06); display:flex; align-items:center; justify-content:center; font-weight:700; color:#fff; touch-action:none; border:1px solid rgba(255,255,255,0.06); }
  .small-btn { width:46px; height:46px; border-radius:10px; background:rgba(255,255,255,0.06); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; touch-action:none; border:1px solid rgba(255,255,255,0.06); user-select:none; -webkit-user-select:none; }
  #gear-col { display:flex; flex-direction:column; gap:8px; align-items:center; margin-right:8px; }
  .muted { opacity:0.95; font-size:12px; color:#eaf6ff; }
  footer { position:absolute; left:12px; bottom:12px; color:rgba(255,255,255,0.7); font-size:12px; pointer-events:none; }

  /* tach canvas (we position it with JS to sit under the left info hud) */
  #tach { position:absolute; width:140px; height:140px; pointer-events:none; transition: left 0.12s, top 0.12s; }

  /* nitro button (moved near joystick) */
  #nitro-btn { width:64px; height:64px; border-radius:50%; background:rgba(255,0,40,0.14); border:1px solid rgba(255,0,40,0.22); color:#fff; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; user-select:none; -webkit-user-select:none; }
  #nitro-gauge { width:64px; height:8px; background:rgba(255,255,255,0.06); border-radius:6px; overflow:hidden; margin-top:6px; border:1px solid rgba(255,255,255,0.04); }
  #nitro-fill { height:100%; background:linear-gradient(90deg,#ffd22f,#ff3547); width:100%; }

  /* joystick row to hold joystick and nitro to its right */
  .joystick-row { display:flex; gap:12px; align-items:center; }

  @media (max-width:600px){
    .hud{max-width:300px;font-size:12px;} .joystick{width:120px;height:120px;} .stick{width:54px;height:54px;} .big-btn{width:70px;height:70px;} #tach{width:120px;height:120px;} #nitro-btn{width:56px;height:56px;} #nitro-gauge{width:56px;}
  }
  .speed-num { font-size:150%; font-weight:800; display:inline-block; transform-origin:left center; margin-left:4px; }
</style>
</head>
<body>

<!-- viewport is the locked-aspect container placed center-screen; JS will size it -->
<div id="viewport">
  <canvas id="gl"></canvas>

  <div id="ui">
    <div style="display:flex;gap:12px;align-items:flex-start;padding:12px">
      <div class="hud" id="left-info-hud">
        <div style="font-weight:80"></div>
        <div class="muted" style="margin-top:4px"></div>
        <div style="margin-top:4px;display:flex;gap:4px;flex-wrap:wrap;align-items:center;">
          <div class="meter" id="speed">SPD:<span class="speed-num">0</span> mph</div>
          <div class="meter" id="rpm"></div>
          <div class="meter" id="gear"></div>
          <div class="meter" id="lap"></div>
          <div class="meter" id="lap-time"></div>
        </div>
      </div>

      <div style="margin-left:auto; pointer-events:auto;">
        <div class="hud" style="text-align:right; min-width:220px;">
          <div style="font-weight:700">Settings</div>
          <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
            <button id="gear-toggle" class="small-btn">Manual</button>
            <button id="reset-btn" class="small-btn">Reset</button>
          </div>
          <div class="muted" style="margin-top:8px;font-size:12px">Objective: pass checkpoints in order. Lap timer starts when you cross checkpoint #1.</div>
          <div class="muted" style="margin-top:6px;font-size:12px" id="next-check">Next: 0 / 0</div>
        </div>
      </div>
    </div>

    <div class="controls-left" id="left-area">
      <!-- joystick row: joystick + nitro (nitro to the right of joystick) -->
      <div class="joystick-row">
        <div id="joystick" class="joystick" aria-label="steering joystick">
          <div id="stick" class="stick">◐</div>
        </div>

        <div style="display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:auto;">
          <button id="nitro-btn" title="Nitro">NTR</button>
          <div id="nitro-gauge"><div id="nitro-fill" style="width:100%"></div></div>
        </div>
      </div>
    </div>

    <div class="controls-right" id="right-area">
      <div class="stack" style="align-items:flex-end;">
        <div style="display:flex; gap:8px; align-items:center;">
          <div id="gear-col"></div>
          <div id="throttle" class="big-btn"></div>
        </div>
        <div id="brake" class="big-btn">BRK</div>
      </div>
    </div>
  </div>

  <!-- tach canvas; JS will position it below #left-info-hud -->
  <canvas id="tach" width="140" height="140" aria-hidden="true"></canvas>

  <footer>Single file. Multi-touch ready. Auto off by default. Shifts go to neutral for 0.1s.</footer>
</div>

<script>
/* =============================
   Enhanced racer (updated):
   - torque map uses POWER variable requested
   - projection bug fixed so camera doesn't jump off to the side
   - nitro moved next to joystick and circular
   - tach dynamically placed below the top-left info hud
   - locked viewport aspect ratio (width-driven) to 7:5 (JS)
   - body & glass respond to suspension + roll (fixed)
   - wheels rendered as cylinders (approximated in 2D projection)
   - skid marks emitted per-wheel (semi-persistent)
   ============================= */

/* ----- tunable constants ----- */
const MAX_STEER_DEG = 20 * Math.PI/180;
const TURN_RESP_FACTOR = 0.15;
const GRIP_MULT = 1.05;
const JOY_DEAD = 0.20;
const NEUTRAL_DELAY_MS = 100;
const PEAK_SHIFT_RPM = 6750;
const AUTO_DOWN_RPM = 4800;
const AUTO_UP_RPM = 6800;
const REDLINE = 7000;
const OFF_TRACK_ACCEL_MULT = 0.5;
const OFF_TRACK_MAX_SPEED_MULT = 0.8;
const DISPLAY_SPEED_BOOST = 1.3;

/* small math helpers */
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function lerp(a,b,t){return a + (b-a)*t;}
const V = {
  add:(a,b)=>[a[0]+b[0],a[1]+b[1],a[2]+b[2]],
  sub:(a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]],
  mul:(a,s)=>[a[0]*s,a[1]*s,a[2]*s],
  dot:(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2],
  cross:(a,b)=>[a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]],
  len:(a)=>Math.hypot(a[0],a[1],a[2]),
  norm:(a)=>{let l=Math.hypot(a[0],a[1],a[2])||1;return [a[0]/l,a[1]/l,a[2]/l];}
};
function rotateY(p,y){const c=Math.cos(y), s=Math.sin(y); return [p[0]*c + p[2]*s, p[1], -p[0]*s + p[2]*c];}

/* ----- DOM & canvas ----- */
const viewport = document.getElementById('viewport');
const canvas = document.getElementById('gl');
const ctx = canvas.getContext('2d', { alpha: false });
const tachCanvas = document.getElementById('tach');
const tctx = tachCanvas.getContext('2d');
let DPR = window.devicePixelRatio || 1, VW=0, VH=0;

/* Desired aspect ratio: width : height = 7 : 5 (width-driven)
   We'll size to available window width but clamp if height would exceed window height. */
function computeViewportSize(){
  const availW = window.innerWidth;
  const availH = window.innerHeight;
  // start from full width
  let w = Math.floor(availW);
  let h = Math.round(w * 5 / 7);
  // if height too large for window, constrain by height
  if(h > availH){
    h = availH;
    w = Math.round(h * 7 / 5);
  }
  // don't exceed window dimensions
  w = Math.min(w, availW);
  h = Math.min(h, availH);
  return {w,h};
}

function resize(){
  DPR = window.devicePixelRatio || 1;
  const {w,h} = computeViewportSize();
  VW = w; VH = h;
  viewport.style.width = VW + 'px';
  viewport.style.height = VH + 'px';
  // canvas pixel buffer
  canvas.style.width = VW + 'px';
  canvas.style.height = VH + 'px';
  canvas.width = Math.max(1, Math.floor(VW * DPR));
  canvas.height = Math.max(1, Math.floor(VH * DPR));
  // tach: keep a fixed visual size (scaled by DPR), but we'll update its pixel buffer too
  const tachVisW = Math.min(160, Math.round(VW * 0.16)); // adapt to viewport width
  const tachVisH = Math.round(tachVisW * 1.0);
  tachCanvas.style.width = tachVisW + 'px';
  tachCanvas.style.height = tachVisH + 'px';
  tachCanvas.width = Math.max(1, Math.floor(tachVisW * DPR));
  tachCanvas.height = Math.max(1, Math.floor(tachVisH * DPR));
  // place tach under the left info hud (calc)
  positionTachUnderLeftHud();
}
window.addEventListener('resize', resize);

/* position the tach canvas directly below the left info hud so it never overlaps */
function positionTachUnderLeftHud(){
  const leftHud = document.getElementById('left-info-hud');
  if(!leftHud) return;
  // bounding rect relative to the viewport
  const hudRect = leftHud.getBoundingClientRect();
  const vpRect = viewport.getBoundingClientRect();
  // compute coords relative to viewport
  let left = Math.max(6, hudRect.left - vpRect.left + 0);
  let top = hudRect.bottom - vpRect.top + 6; // just below the hud
  // ensure tach doesn't overflow viewport
  const tachW = parseFloat(tachCanvas.style.width);
  const tachH = parseFloat(tachCanvas.style.height);
  if(left + tachW + 8 > VW) left = VW - tachW - 8;
  if(top + tachH + 8 > VH) top = hudRect.top - vpRect.top - tachH - 8; // try place above if no room
  left = Math.max(6, left);
  top = Math.max(6, top);
  tachCanvas.style.left = left + 'px';
  tachCanvas.style.top = top + 'px';
}

/* initial resize */
resize();

/* ----- car (physical params + suspension) ----- */

/* YOUR REQUEST: use POWER and map torque values relative to it */
const POWER = 300;

const car = {
  pos:[0,0.35,0], vel:[0,0,0], heading:0, yawRate:0,
  mass:1380, wheelbase:2.57, cgHeight:0.55, cgToFront:1.1, cgToRear:1.47,
  wheelRadius:0.33, inertia:2400,
  rpmIdle:900, rpmRedline:REDLINE,
  /* torque map based on POWER as you requested */
  torqueMap:[
    [0,POWER*(90/300)],[800,POWER*(140/300)],[1500,POWER*(190/300)],[3000,POWER*(225/300)],[5000,POWER*(260/300)],[PEAK_SHIFT_RPM,POWER],[7500,POWER*(275/300)]
  ],
  gearRatios:[4.887, 3.5, 2.5, 1.814, 1.5],
  finalDrive:4.1, reverseRatio:-3.6,
  currentGear:1, transmissionEfficiency:0.92, clutchEngaged:true,
  CdA:1.5, airDensity:2.45, rollingResistance:0.02,
  gripCoef:4.0 * GRIP_MULT,
  brakeTorqueMax:10000,
  tireStiffness:90000,
  yawDamping:0.92,
  driveModeAuto:true,

  /* suspension (simple per-wheel spring-damper) */
  suspensionRest:0.35,
  suspensionK:35000,
  suspensionC:4200,
  suspensionTravel:0.20,
  vertVel:0,
  rollAngle:0, rollVel:0
};

/* wheel geometry */
const chassis = { width:1.7, height:0.6, length:3.8 };
const wheelInset = 0;
const wheelOffsetX = (chassis.width/2) - wheelInset;
const wheelOffsetZFront = chassis.length*0.5 - 0.45;
const wheelOffsetZRear = -chassis.length*0.5 + 0.45;

let wheelState = [
  {x:-wheelOffsetX, z:wheelOffsetZFront, steer:true, compression:0, force:0},
  {x: wheelOffsetX, z:wheelOffsetZFront, steer:true, compression:0, force:0},
  {x:-wheelOffsetX, z:wheelOffsetZRear, steer:false, compression:0, force:0},
  {x: wheelOffsetX, z:wheelOffsetZRear, steer:false, compression:0, force:0}
];

/* skid marks store (semi-persistent) */
const skidMarks = []; // each: {x1,z1,x2,z2,life,lifeMax,width}
let lastWheelSkidPos = [null,null,null,null];
let lastWheelSkidTime = [0,0,0,0];

/* torque helpers */
function engineTorqueAtRPM(rpm){
  rpm = Math.max(0, rpm);
  const map = car.torqueMap;
  if(rpm <= map[0][0]) return map[0][1];
  for(let i=1;i<map.length;i++){
    if(rpm <= map[i][0]){
      const [r0,t0] = map[i-1], [r1,t1] = map[i];
      const f = (rpm - r0)/(r1 - r0);
      return t0 + (t1 - t0)*f;
    }
  }
  return map[map.length-1][1];
}
function engineRPMFromWheelSpeed(wheelOmega, gearIndex){
  if(gearIndex === -1) return wheelOmega * Math.abs(car.reverseRatio) * car.finalDrive * 60 / (2*Math.PI);
  if(gearIndex === 0) return car.rpmIdle;
  return wheelOmega * car.gearRatios[gearIndex-1] * car.finalDrive * 60 / (2*Math.PI);
}

/* ----- input + pointer multitouch ----- */
const input = { throttle:false, brake:false, steer:0, nitro:false };
function makePointerControl(el, onStart, onMove, onEnd){
  if(!el) return;
  el.addEventListener('pointerdown', (ev)=>{ ev.preventDefault(); try{ el.setPointerCapture(ev.pointerId); }catch(e){} onStart && onStart(ev); }, {passive:false});
  el.addEventListener('pointermove', (ev)=>{ onMove && onMove(ev); }, {passive:false});
  el.addEventListener('pointerup', (ev)=>{ try{ el.releasePointerCapture(ev.pointerId); }catch(e){} onEnd && onEnd(ev); }, {passive:false});
  el.addEventListener('pointercancel', (ev)=>{ try{ el.releasePointerCapture(ev.pointerId); }catch(e){} onEnd && onEnd(ev); }, {passive:false});
}

/* joystick */
const joystick = document.getElementById('joystick'), stick = document.getElementById('stick');
let joyCenter=null, activeStickId=null;
function joystickStart(ev){
  activeStickId = ev.pointerId;
  const r = joystick.getBoundingClientRect();
  joyCenter = { x: r.left + r.width/2, y: r.top + r.height/2, r: r.width/2 };
  joystickMove(ev);
}
function joystickMove(ev){
  if(activeStickId !== ev.pointerId) return;
  const dx = (ev.clientX - joyCenter.x), dy = (ev.clientY - joyCenter.y);
  const max = joyCenter.r - 10;
  let sx = clamp(dx/max, -1, 1);
  if(Math.abs(sx) < JOY_DEAD) sx = 0;
  else sx = (sx - Math.sign(sx)*JOY_DEAD) / (1 - JOY_DEAD);
  input.steer = sx;
  stick.style.transform = `translate(${sx*40}px, ${clamp(dy/max,-1,1)*20}px)`;
}
function joystickEnd(ev){
  if(activeStickId !== ev.pointerId) return;
  activeStickId = null; joyCenter = null; input.steer = 0; stick.style.transform = `translate(0px,0px)`;
}
makePointerControl(joystick, joystickStart, joystickMove, joystickEnd);

/* throttle & brake */
const throttleEl = document.getElementById('throttle'), brakeEl = document.getElementById('brake');
makePointerControl(throttleEl, (e)=>{ input.throttle=true; }, null, ()=>{ input.throttle=false; });
makePointerControl(brakeEl, (e)=>{ input.brake=true; }, null, ()=>{ input.brake=false; });

/* gear UI */
const gearCol = document.getElementById('gear-col'), gearToggle = document.getElementById('gear-toggle'), resetBtn = document.getElementById('reset-btn');
function createGearButtons(){
  gearCol.innerHTML = '';
  if(!car.driveModeAuto){
    const up=document.createElement('div'), down=document.createElement('div');
    up.className='small-btn'; up.textContent='▲'; down.className='small-btn'; down.textContent='▼';
    makePointerControl(up, (e)=>{ startShift(1); }, null, ()=>{});
    makePointerControl(down, (e)=>{ startShift(-1); }, null, ()=>{});
    gearCol.appendChild(up); gearCol.appendChild(down);
  }
}
gearToggle.addEventListener('click', ()=>{ car.driveModeAuto = !car.driveModeAuto; gearToggle.textContent = car.driveModeAuto ? 'Auto' : 'Manual'; createGearButtons(); });
resetBtn.addEventListener('click', resetCar);
createGearButtons();

/* keyboard */
window.addEventListener('keydown', (e)=>{
  if(e.key === 'w') input.throttle=true;
  if(e.key === 's') input.brake=true;
  if(e.key === 'a') input.steer=-1;
  if(e.key === 'd') input.steer=1;
  if(e.key === 't'){ car.driveModeAuto = !car.driveModeAuto; gearToggle.textContent = car.driveModeAuto ? 'Auto' : 'Manual'; createGearButtons(); }
  if(e.key === 'r') resetCar();
  if(e.key === 'ArrowUp') startShift(1);
  if(e.key === 'ArrowDown') startShift(-1);
  if(e.key === 'n') { input.nitro = true; }
});
window.addEventListener('keyup',(e)=>{ if(e.key === 'w') input.throttle=false; if(e.key === 's') input.brake=false; if(e.key === 'a' || e.key === 'd') input.steer=0; if(e.key === 'n'){ input.nitro = false; } });

/* SHIFT logic */
let shifting = false;
let pendingGear = null;
function startShift(dir){
  if(shifting) return;
  shifting = true;
  let target;
  if(dir > 0){
    if(car.currentGear === -1) target = 0; else target = clamp(car.currentGear+1, -1, car.gearRatios.length);
  } else {
    if(car.currentGear === 0) target = -1; else target = clamp(car.currentGear-1, -1, car.gearRatios.length);
  }
  car.currentGear = 0;
  pendingGear = target;
  setTimeout(()=>{
    car.currentGear = pendingGear;
    shifting = false;
    pendingGear = null;
  }, NEUTRAL_DELAY_MS);
}

/* ----- visual car parts (wheels use wheelState compression for vertical placement) ----- */
/* FIXED PROJECT: return coordinates in canvas buffer pixels (no CSS/DPR mismatch) */
function project(pt, camPos, camYaw){
  const rel = V.sub(pt, camPos);
  const camSpace = rotateY(rel, -camYaw);
  const z = camSpace[2] + 0.001;
  if(z <= 0.05) return null;
  // use canvas.width/canvas.height (buffer pixels) for projection so drawing on ctx is consistent
  const px = (camSpace[0] / z) * (canvas.width/2) * 1.1 + canvas.width/2;
  const py = (-camSpace[1] / z) * (canvas.height/2) * 1.05 + canvas.height/2;
  return { x: px, y: py, depth: z };
}

function drawCar(pos, heading, color='#0b84ff'){
  // wheel cylinder params
  const wheelThicknessM = 0.28; // meters
  const segments = 12; // sampling around rim for cylinder surface

  // wheels: render cylinder per-wheel
  for(let i=0;i<wheelState.length;i++){
    const w = wheelState[i];
    // world y for wheel center (attachment + radius + compression)
    const centerLocal = [w.x, -car.suspensionRest + car.wheelRadius + (-w.compression || 0), w.z];
    // face centers along local lateral axis
    const halfThick = wheelThicknessM * 0.5;
    // we'll generate perimeter points around each face (left/right)
    const faceL = V.add(pos, rotateY([w.x - halfThick, centerLocal[1], w.z], heading));
    const faceR = V.add(pos, rotateY([w.x + halfThick, centerLocal[1], w.z], heading));

    // sample rim points in the up-forward plane (local y & z)
    const rimPointsL = [];
    const rimPointsR = [];
    for(let s=0;s<segments;s++){
      const t = s / segments;
      const ang = t * Math.PI * 2;
      // local offsets: up = +y, forward = +z
      const offY = Math.cos(ang) * car.wheelRadius;
      const offZ = Math.sin(ang) * car.wheelRadius;
      const pLocalL = [w.x - halfThick, -car.suspensionRest + car.wheelRadius + (-w.compression || 0) + offY, w.z + offZ];
      const pLocalR = [w.x + halfThick, -car.suspensionRest + car.wheelRadius + (-w.compression || 0) + offY, w.z + offZ];
      rimPointsL.push(V.add(pos, rotateY(pLocalL, heading)));
      rimPointsR.push(V.add(pos, rotateY(pLocalR, heading)));
    }

    // project rim points and draw surface quads between L & R corresponding points
    const projL = rimPointsL.map(p=>project(p, camPos, camYaw));
    const projR = rimPointsR.map(p=>project(p, camPos, camYaw));
    // if majority missing, skip complex surface and fallback to ellipse
    const visibleCount = projL.concat(projR).filter(Boolean).length;
    if(visibleCount >= 4){
      // draw surface by connecting consecutive segments
      for(let s=0;s<segments;s++){
        const s2 = (s+1) % segments;
        const a = projL[s], b = projR[s], c = projR[s2], d = projL[s2];
        if(!a||!b||!c||!d) continue;
        // side shading based on vertical of mid normal (quick fake)
        const midDepth = (a.depth + b.depth + c.depth + d.depth) / 4;
        const shadeAmt = clamp(0.12 + (1 / (1 + midDepth*0.4)), 0.05, 0.7);
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.lineTo(c.x, c.y);
        ctx.lineTo(d.x, d.y);
        ctx.closePath();
        ctx.fillStyle = `rgba(${Math.floor(12*shadeAmt)},${Math.floor(12*shadeAmt)},${Math.floor(12*shadeAmt)},1)`;
        ctx.fill();
      }
      // draw face ellipses on top (use center projection)
      const pCenterL = project(faceL, camPos, camYaw);
      const pCenterR = project(faceR, camPos, camYaw);
      const example = projL[0] || projR[0];
      const wheelH = example ? Math.max(6, DPR * car.wheelRadius * 18 * clamp(1/(0.0025*example.depth),0.28,1.4)) : Math.max(6, DPR * car.wheelRadius * 18);
      if(pCenterR){
        ctx.beginPath();
        ctx.ellipse(pCenterR.x, pCenterR.y, wheelH * 0.72, wheelH, 0, 0, Math.PI*2);
        ctx.fillStyle = '#111'; ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = Math.max(0.5, DPR*0.5); ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(pCenterR.x, pCenterR.y, wheelH * 0.32, wheelH * 0.46, 0, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = Math.max(0.3, DPR*0.3); ctx.stroke();
      }
      if(pCenterL){
        ctx.beginPath();
        ctx.ellipse(pCenterL.x, pCenterL.y, wheelH * 0.72, wheelH, 0, 0, Math.PI*2);
        ctx.fillStyle = '#111'; ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = Math.max(0.5, DPR*0.5); ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(pCenterL.x, pCenterL.y, wheelH * 0.32, wheelH * 0.46, 0, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = Math.max(0.3, DPR*0.3); ctx.stroke();
      }
    } else {
      // fallback: single ellipse (keeps prior look if projection fails)
      const center = project([pos[0]+w.x, pos[1]+centerLocal[1]-pos[1], pos[2]+w.z], camPos, camYaw) || null;
      if(center){
        const wheelH = Math.max(6, DPR * car.wheelRadius * 18);
        ctx.beginPath();
        ctx.ellipse(center.x, center.y, wheelH * 0.72, wheelH, 0, 0, Math.PI*2);
        ctx.fillStyle = '#111';
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.04)';
        ctx.lineWidth = Math.max(0.5, DPR*0.5);
        ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(center.x, center.y, wheelH * 0.32, wheelH * 0.46, 0, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
        ctx.lineWidth = Math.max(0.3, DPR*0.3);
        ctx.stroke();
      }
    }
  }

  // chassis - vertical offset uses car.pos[1], roll uses car.rollAngle to offset corner heights
  const hw = chassis.width/2, hl = chassis.length/2, hh = chassis.height;
  const roll = car.rollAngle;
  // tilt-based vertical offset: vertical displacement = -x * tan(roll)
  const tilt = Math.tan(clamp(roll, -0.6, 0.6));
  const rollScale = 0.72; // visual scale (tune if you want stronger/weaker tilt)
  const boxCorners = [
    [-hw,0, hl],[ hw,0, hl],[ hw,hh, hl],[-hw,hh, hl],
    [-hw,0,-hl],[ hw,0,-hl],[ hw,hh,-hl],[-hw,hh,-hl]
  ];
  const worldCorners = boxCorners.map((c, idx)=>{
    let corner = c.slice();
    // apply tilt across the x axis: left/right corners move up/down proportionally
    corner[1] += -corner[0] * tilt * rollScale;
    return V.add( rotateY(corner, heading), pos );
  });
  const faces = [[0,1,2,3],[4,5,6,7],[0,1,5,4],[2,3,7,6],[1,2,6,5],[0,3,7,4]];
  const faceDepths = faces.map((f,i)=>{ const d=(worldCorners[f[0]][2]+worldCorners[f[1]][2]+worldCorners[f[2]][2]+worldCorners[f[3]][2])/4; return {i,d}; }).sort((a,b)=>b.d-a.d);
  for(const fd of faceDepths){
    const face = faces[fd.i];
    const pts = face.map(i=>project(worldCorners[i], camPos, camYaw)).filter(Boolean);
    if(pts.length<4) continue;
    const a=worldCorners[face[0]], b=worldCorners[face[1]], cpt=worldCorners[face[2]];
    const normal = V.norm( V.cross(V.sub(b,a), V.sub(cpt,a)) );
    const lightDir = V.norm([0.5,1,0.2]);
    const ndotl = clamp(V.dot(normal, lightDir), 0, 1);
    const amb = 0.45;
    ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y); ctx.closePath();
    ctx.fillStyle = shade(color, amb + ndotl*0.9); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = Math.max(0.4, DPR*0.35); ctx.stroke();
  }

  // cabin/glass (responds to roll now)
  const cabW = chassis.width*0.72, cabL = chassis.length*0.6, cabH = chassis.height*0.7;
  const cabCenter = [0, chassis.height*0.4, 0.05];
  const cabCorners = [
    [-cabW/2, cabCenter[1]-0.02, cabL/2 + cabCenter[2]],
    [ cabW/2, cabCenter[1]-0.02, cabL/2 + cabCenter[2]],
    [ cabW/2, cabCenter[1]+cabH, cabL/2 + cabCenter[2]],
    [-cabW/2, cabCenter[1]+cabH, cabL/2 + cabCenter[2]],
    [-cabW/2, cabCenter[1]-0.02, -cabL/2 + cabCenter[2]],
    [ cabW/2, cabCenter[1]-0.02, -cabL/2 + cabCenter[2]],
    [ cabW/2, cabCenter[1]+cabH, -cabL/2 + cabCenter[2]],
    [-cabW/2, cabCenter[1]+cabH, -cabL/2 + cabCenter[2]],
  ];
  // apply tilt to cabin corners
  const worldCab = cabCorners.map(c=> {
    const corner = c.slice();
    corner[1] += -corner[0] * tilt * rollScale;
    return V.add( rotateY(corner, heading), V.add(pos,[0,0.08,0]) );
  });
  const cabFaces = [[0,1,2,3],[4,5,6,7],[0,1,5,4],[2,3,7,6],[1,2,6,5],[0,3,7,4]];
  for(const face of cabFaces){
    const pts = face.map(i=>project(worldCab[i], camPos, camYaw)).filter(Boolean);
    if(pts.length<4) continue;
    ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x, pts[i].y); ctx.closePath();
    ctx.fillStyle = shade('#cce8ff', 0.9); ctx.fill(); ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = Math.max(0.3, DPR*0.3); ctx.stroke();
  }
}
function shade(hex, lum){
  hex = hex.replace('#',''); if(hex.length===3) hex = hex.split('').map(h=>h+h).join('');
  const rgb = parseInt(hex,16);
  const r = Math.min(255, Math.max(0, ((rgb>>16)&255) * lum )|0);
  const g = Math.min(255, Math.max(0, ((rgb>>8)&255) * lum )|0);
  const b = Math.min(255, Math.max(0, ((rgb)&255) * lum )|0);
  return `rgb(${r},${g},${b})`;
}

/* ----- procedural track & drawing (unchanged) ----- */
let trackPoints = []; const TRACK_POINTS = 900; const TRACK_RADIUS = 90; const TRACK_WIDTH = 7.5;
function generateTrack(){ trackPoints=[]; for(let i=0;i<TRACK_POINTS;i++){ const t=i/TRACK_POINTS; const theta=t*Math.PI*2; const r=TRACK_RADIUS+22*Math.sin(3*theta)+12*Math.sin(5*theta); trackPoints.push({x:r*Math.cos(theta),y:0,z:r*Math.sin(theta)}); } for(let k=0;k<4;k++){ for(let i=0;i<TRACK_POINTS;i++){ const p=trackPoints[i]; const prev=trackPoints[(i-1+TRACK_POINTS)%TRACK_POINTS]; const next=trackPoints[(i+1)%TRACK_POINTS]; p.x=(prev.x+p.x+next.x)/3; p.z=(prev.z+p.z+next.z)/3; } } }
generateTrack();
let checkpoints = [];
function generateCheckpoints(n = 20){ checkpoints=[]; const step = Math.floor(TRACK_POINTS / n); for(let i=0;i<n;i++){ const idx=(i*step)%TRACK_POINTS; const p=trackPoints[idx]; const next=trackPoints[(idx+3)%TRACK_POINTS]; const tan=V.norm([next.x-p.x,0,next.z-p.z]); const right=[-tan[2],0,tan[0]]; checkpoints.push({pos:[p.x,p.y,p.z],tan,right,index:i,visited:false}); } }
generateCheckpoints(14);

function drawTrack(camPos, camYaw){
  ctx.lineWidth = Math.max(1, DPR*0.6);
  for(let i=0;i<TRACK_POINTS;i++){
    const a=trackPoints[i], b=trackPoints[(i+1)%TRACK_POINTS];
    const tan = V.norm([b.x-a.x,0,b.z-a.z]);
    const normal = [-tan[2],0,tan[0]];
    const leftA=[a.x-normal[0]*TRACK_WIDTH, a.y, a.z-normal[2]*TRACK_WIDTH];
    const rightA=[a.x+normal[0]*TRACK_WIDTH, a.y, a.z+normal[2]*TRACK_WIDTH];
    const leftB=[b.x-normal[0]*TRACK_WIDTH, b.y, b.z-normal[2]*TRACK_WIDTH];
    const rightB=[b.x+normal[0]*TRACK_WIDTH, b.y, b.z+normal[2]*TRACK_WIDTH];
    const pLA=project(leftA, camPos, camYaw), pRA=project(rightA, camPos, camYaw), pLB=project(leftB, camPos, camYaw), pRB=project(rightB, camPos, camYaw);
    if(!pLA||!pRA||!pLB||!pRB) continue;
    ctx.beginPath(); ctx.moveTo(pLA.x,pLA.y); ctx.lineTo(pLB.x,pLB.y); ctx.lineTo(pRB.x,pRB.y); ctx.lineTo(pRA.x,pRA.y); ctx.closePath();
    ctx.fillStyle = '#2f2f2f'; ctx.fill();
    const segments=2;
    for(let s=0;s<segments;s++){
      const t0=s/segments,t1=(s+1)/segments;
      const pa={x:lerp(pLA.x,pLB.x,t0), y:lerp(pLA.y,pLB.y,t0)};
      const pb={x:lerp(pLA.x,pLB.x,t1), y:lerp(pLA.y,pLB.y,t1)};
      ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y);
      ctx.strokeStyle = (s%2===0)?'rgba(255,255,255,0.95)':'rgba(255,40,40,0.95)';
      ctx.lineWidth = Math.max(3, DPR*3.0); ctx.stroke();
    }
    for(let s=0;s<segments;s++){
      const t0=s/segments,t1=(s+1)/segments;
      const pa={x:lerp(pRA.x,pRB.x,t0), y:lerp(pRA.y,pRB.y,t0)};
      const pb={x:lerp(pRA.x,pRB.x,t1), y:lerp(pRA.y,pRB.y,t1)};
      ctx.beginPath(); ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y);
      ctx.strokeStyle = (s%2===0)?'rgba(255,255,255,0.95)':'rgba(255,40,40,0.95)';
      ctx.lineWidth = Math.max(3, DPR*3.0); ctx.stroke();
    }
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.95)'; ctx.lineWidth = Math.max(1, DPR*1.2);
  for(let i=0;i<TRACK_POINTS;i+=6){
    const a=trackPoints[i], b=trackPoints[(i+1)%TRACK_POINTS];
    const mid=[(a.x+b.x)/2,0,(a.z+b.z)/2];
    const next=trackPoints[(i+2)%TRACK_POINTS];
    const tan=V.norm([next.x-a.x,0,next.z-a.z]);
    const p1=project([mid.x - tan[0]*0.6, mid.y+0.01, mid.z - tan[2]*0.6], camPos, camYaw);
    const p2=project([mid.x + tan[0]*0.6, mid.y+0.01, mid.z + tan[2]*0.6], camPos, camYaw);
    if(p1 && p2){ ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke(); }
  }
}

function drawCheckpoints(camPos, camYaw){
  for(let i=0;i<checkpoints.length;i++){
    const cp=checkpoints[i];
    const left=V.add(cp.pos, V.mul(cp.right, -TRACK_WIDTH*1.2));
    const right=V.add(cp.pos, V.mul(cp.right, TRACK_WIDTH*1.2));
    const pL=project([left[0], left[1]+0.1, left[2]], camPos, camYaw);
    const pR=project([right[0], right[1]+0.1, right[2]], camPos, camYaw);
    if(!pL||!pR) continue;
    ctx.beginPath(); ctx.moveTo(pL.x,pL.y); ctx.lineTo(pR.x,pR.y);
    ctx.lineWidth = Math.max(2, DPR*2.2);
    ctx.strokeStyle = checkpoints[i].visited ? 'rgba(0,200,0,0.95)' : 'rgba(255,80,80,0.95)';
    ctx.stroke();
    const pM = project([cp.pos[0], cp.pos[1]+0.5, cp.pos[2]], camPos, camYaw);
    if(pM){ ctx.beginPath(); ctx.arc(pM.x, pM.y, Math.max(2, DPR*3.0), 0, Math.PI*2); ctx.fillStyle = checkpoints[i].visited ? 'rgba(0,200,0,0.95)' : 'rgba(255,80,80,0.95)'; ctx.fill(); }
  }
}

/* draw ground tiles */
function drawGroundPlane(camPos, camYaw){
  const TILE = 4; const R = 100;
  for(let ix=-R; ix<R; ix++){
    for(let iz=-R; iz<R; iz++){
      const wx = Math.floor((camPos[0]/TILE) + ix) * TILE;
      const wz = Math.floor((camPos[2]/TILE) + iz) * TILE;
      const y = -0.01;
      const a = [wx - TILE/2, y, wz - TILE/2];
      const b = [wx + TILE/2, y, wz - TILE/2];
      const c = [wx + TILE/2, y, wz + TILE/2];
      const d = [wx - TILE/2, y, wz + TILE/2];
      const pa = project(a, camPos, camYaw), pb = project(b, camPos, camYaw), pc = project(c, camPos, camYaw), pd = project(d, camPos, camYaw);
      if(!pa||!pb||!pc||!pd) continue;
      const shadeCol = ((ix+iz)&1) ? '#3fa037' : '#379b30';
      ctx.beginPath(); ctx.moveTo(pa.x, pa.y); ctx.lineTo(pb.x, pb.y); ctx.lineTo(pc.x, pc.y); ctx.lineTo(pd.x, pd.y); ctx.closePath();
      ctx.fillStyle = shadeCol; ctx.fill();
    }
  }
}

/* ----- physics: suspension, vertical dynamics, nitro, improved yaw model ----- */
let lastTs = performance.now();
let engineActualRPM = car.rpmIdle;
let clutchTimer = 0;

/* nitro state */
car.nitroFuel = 3.0; // seconds
car.nitroMax = 3.0;
car.nitroActive = false;
car.nitroRechargeRate = 0.5; // sec of fuel per second when unused
car.nitroDrainRate = 1.0; // fuel per second while active
const nitroButton = document.getElementById('nitro-btn');
makePointerControl(nitroButton, ()=>{ input.nitro=true; }, null, ()=>{ input.nitro=false; });
function updateNitroUI(){ const pct = clamp(car.nitroFuel/car.nitroMax,0,1); document.getElementById('nitro-fill').style.width = `${pct*100}%`; nitroButton.textContent = car.nitroFuel>0? 'NTR' : 'WAIT'; }

function sampleGroundHeight(x,z){
  // track & ground are at y=0 (flat)
  return 0;
}

/* skid detection thresholds */
const SKID_LAT_THRESHOLD = 7.5; // m/s lateral velocity threshold for sliding
const SKID_BRAKE_SPEED = 10.0;   // m/s forward speed threshold for heavy brake skids
const SKID_LIFE = 4.0;          // seconds for skid mark fade
const SKID_ADD_INTERVAL = 0.03; // seconds between adding skid segments while sliding

function physicsStep(dt){
  const steerInput = clamp(input.steer, -1, 1);
  const throttle = input.throttle ? 1 : 0;
  const brake = input.brake ? 1 : 0;

  // nitro consumption/boost logic
  if(input.nitro && car.nitroFuel > 0){
    car.nitroActive = true;
    car.nitroFuel = Math.max(0, car.nitroFuel - car.nitroDrainRate * dt);
  } else {
    car.nitroActive = false;
    car.nitroFuel = Math.min(car.nitroMax, car.nitroFuel + car.nitroRechargeRate * dt);
  }
  updateNitroUI();

  const forward = [ Math.sin(car.heading), 0, Math.cos(car.heading) ];
  const right = [ Math.cos(car.heading), 0, -Math.sin(car.heading) ];

  let v_long = V.dot(car.vel, forward);
  let v_lat  = V.dot(car.vel, right);

  // wheel rotation estimate
  const wheelOmega = v_long / Math.max(0.0001, car.wheelRadius);

  // engine rpm handling (improved)
  let engRpmDriven;
  if (car.clutchEngaged && car.currentGear !== 0) {
    engRpmDriven = engineRPMFromWheelSpeed(Math.abs(wheelOmega), car.currentGear);
  } else {
    engRpmDriven = engineActualRPM;
  }
  const clutchFactor = car.clutchEngaged ? 0.85 : 0.02;
  engineActualRPM = engineActualRPM + (engRpmDriven - engineActualRPM) * clamp(dt * (clutchFactor * 8), 0, 1) + throttle * 1200 * dt;
  if (car.clutchEngaged) engineActualRPM = Math.max(car.rpmIdle * 0.9, engineActualRPM);
  if (engineActualRPM < car.rpmIdle && car.clutchEngaged) car.clutchEngaged = false;
  else if (!car.clutchEngaged && (engineActualRPM > car.rpmIdle * 1.1 || Math.abs(V.dot(car.vel, forward)) > 0.4)) car.clutchEngaged = true;

  // engine torque & drive force
  const engineTorque = engineTorqueAtRPM(engineActualRPM) * throttle;
  let driveWheelTorque = 0;
  if(car.currentGear !== 0 && car.clutchEngaged){
    const gr = (car.currentGear === -1) ? car.reverseRatio : car.gearRatios[car.currentGear-1];
    driveWheelTorque = engineTorque * Math.abs(gr) * car.finalDrive * car.transmissionEfficiency * (car.currentGear === -1 ? -1 : 1);
  }
  let driveForce = driveWheelTorque / car.wheelRadius;

  // nitro adds extra instantaneous forward force
  if(car.nitroActive && car.nitroFuel > 0){
    driveForce += 7000; // boost
  }

  // off-track penalty
  const off = isOffTrack(car.pos);
  if(off) driveForce *= OFF_TRACK_ACCEL_MULT;

  const brakeForce = brake ? car.brakeTorqueMax / car.wheelRadius : 0;
  const longitudinalBrakeForce = Math.sign(v_long||1) * clamp(brakeForce, 0, Math.abs(brakeForce));
  const drag = 0.5 * car.airDensity * car.CdA * v_long * v_long * Math.sign(v_long || 1);
  const rr = car.rollingResistance * car.mass * 9.81 * Math.sign(v_long || 1);
  const Fx = driveForce - drag - rr - longitudinalBrakeForce;
  const ax = Fx / car.mass;

  // suspension: compute compression & forces per wheel, accumulate vertical force, and left-right imbalance for roll
  let totalSuspensionForce = 0;
  let leftSum = 0, rightSum = 0;
  for(let i=0;i<wheelState.length;i++){
    const w = wheelState[i];
    // world pos of wheel attachment point (chassis side)
    const attachLocal = [w.x, -car.suspensionRest, w.z];
    const attachWorld = V.add(car.pos, rotateY(attachLocal, car.heading));
    const groundY = sampleGroundHeight(attachWorld[0], attachWorld[2]);
    const distance = attachWorld[1] - groundY;
    let compression = car.suspensionRest - distance;
    compression = clamp(compression, -car.suspensionTravel, car.suspensionTravel);
    const lateralOffset = w.x;
    const wheelVertVel = car.vertVel + (car.yawRate * lateralOffset * 0.1);
    let force = 0;
    if(compression > 0){
      force = car.suspensionK * compression - car.suspensionC * wheelVertVel;
      force = Math.max(0, force);
    } else {
      force = car.suspensionK * compression * 0.2;
    }
    w.compression = compression;
    w.force = force;
    totalSuspensionForce += force;
    if(w.x < 0) leftSum += force; else rightSum += force;
  }

  // apply vertical acceleration (sum suspension minus gravity)
  const gravity = car.mass * 9.81;
  const vertAcc = (totalSuspensionForce - gravity) / car.mass;
  car.vertVel += vertAcc * dt;
  car.pos[1] += car.vertVel * dt;
  if(car.pos[1] < 0.05){ car.pos[1] = 0.05; car.vertVel = 0; }

  // roll dynamics: left-right imbalance produces roll acceleration
  // stronger, clearer roll model: roll acceleration proportional to force imbalance
  // tuned scale so roll is visible but stable
  const rollImbalance = (rightSum - leftSum); // N
  // scale -> rad/s^2 (empirically tuned)
  const rollGain = 0.002; // increase for stronger roll, decrease to soften
  const rollDamping = 0.9; // damping per step (0..1)
  const rollAcc = rollImbalance * rollGain;
  car.rollVel += rollAcc * dt;
  car.rollVel *= rollDamping;
  car.rollAngle += car.rollVel * dt;
  // clamp angle to reasonable range (±20 degrees ~ 0.35 rad)
  car.rollAngle = clamp(car.rollAngle, -0.35, 0.35);
  // slowly bias back to 0 when forces settle
  car.rollAngle = lerp(car.rollAngle, 0, clamp(dt*1.8, 0, 1));

  // lateral tire forces (bicycle-ish)
  const normalFrontStatic = (car.cgToRear / car.wheelbase) * car.mass * 9.81;
  const normalRearStatic  = (car.cgToFront / car.wheelbase) * car.mass * 9.81;
  const frontForceSum = wheelState[0].force + wheelState[1].force;
  const rearForceSum  = wheelState[2].force + wheelState[3].force;
  const normalFront = Math.max(150, frontForceSum);
  const normalRear  = Math.max(150, rearForceSum);

  const steerAngle = clamp(steerInput * MAX_STEER_DEG, -0.6, 0.6);
  const vel = Math.max(0.001, Math.abs(v_long));
  const alphaF = Math.atan2(v_lat + car.yawRate * car.cgToFront, vel) - steerAngle;
  const alphaR = Math.atan2(v_lat - car.yawRate * car.cgToRear, vel);

  const Cf = car.tireStiffness * 0.55;
  const Cr = car.tireStiffness * 0.45;
  let Fy_f = -Cf * alphaF;
  let Fy_r = -Cr * alphaR;
  const maxFront = Math.abs(car.gripCoef * normalFront);
  const maxRear  = Math.abs(car.gripCoef * normalRear);
  if(Math.abs(Fy_f) > maxFront) Fy_f = Math.sign(Fy_f) * maxFront;
  if(Math.abs(Fy_r) > maxRear)  Fy_r = Math.sign(Fy_r) * maxRear;

  // yaw dynamics
  const yawTorque = Fy_f * car.cgToFront - Fy_r * car.cgToRear;
  const yawAcc = yawTorque / car.inertia;
  car.yawRate += yawAcc * dt;
  const baseYawRate = (Math.sign(steerAngle) * (Math.abs( Math.tan(steerAngle)) > 1e-6 ? (Math.abs(v_long) * Math.tan(steerAngle) / Math.max(0.1, car.wheelbase)) : 0));
  const speedFactor = clamp(1 - Math.abs(v_long)/120, 0.35, 1.0);
  let yawRateTarget = baseYawRate * speedFactor * TURN_RESP_FACTOR;
  car.yawRate = lerp(car.yawRate, yawRateTarget, clamp(dt * 4 * (1 - car.yawDamping + 0.2), 0, 1));
  car.heading += car.yawRate * dt;

  const ay_body = (Fy_f + Fy_r) / car.mass;
  const dv_lat = (ay_body - car.yawRate * v_long) * dt;
  const new_v_lat = v_lat + dv_lat;
  const new_v_long = v_long + ax * dt;
  car.vel = V.add(V.mul(forward, new_v_long), V.mul(right, new_v_lat));
  car.pos = V.add(car.pos, V.mul(car.vel, dt));

  // --- SKID DETECTION & SKID MARK CREATION (per-wheel) ---
  const now = performance.now() / 1000;
  const isSliding = Math.abs(new_v_lat) > SKID_LAT_THRESHOLD && Math.abs(new_v_long) > 1.5;
  const isBrakingSkid = (brake && Math.abs(new_v_long) > SKID_BRAKE_SPEED);

  for(let i=0;i<wheelState.length;i++){
    const w = wheelState[i];
    const attachLocal = [w.x, -car.suspensionRest + car.wheelRadius + (-w.compression || 0), w.z];
    const attachWorld = V.add(car.pos, rotateY(attachLocal, car.heading));
    if(isSliding || isBrakingSkid){
      if(!lastWheelSkidPos[i]) lastWheelSkidPos[i] = [attachWorld[0], attachWorld[2]];
      if(now - lastWheelSkidTime[i] > SKID_ADD_INTERVAL){
        const segWidth = clamp(Math.abs(new_v_long) / 8, 0.35, 1.6); // meters
        skidMarks.push({ x1:lastWheelSkidPos[i][0], z1:lastWheelSkidPos[i][1], x2:attachWorld[0], z2:attachWorld[2], life:SKID_LIFE, lifeMax:SKID_LIFE, width:segWidth });
        lastWheelSkidPos[i] = [attachWorld[0], attachWorld[2]];
        lastWheelSkidTime[i] = now;
      }
    } else {
      lastWheelSkidPos[i] = null;
    }
  }

  // age and cull skid marks
  for(let i=skidMarks.length-1;i>=0;i--){
    skidMarks[i].life -= dt;
    if(skidMarks[i].life <= 0) skidMarks.splice(i,1);
  }

  // auto-shift
  if(car.driveModeAuto && !shifting){
    const absEng = engineActualRPM;
    if(absEng > AUTO_UP_RPM && car.currentGear < car.gearRatios.length){
      shifting = true; const targ = car.currentGear + 1; car.currentGear = 0;
      setTimeout(()=>{ car.currentGear = targ; shifting = false; }, NEUTRAL_DELAY_MS);
    } else if(absEng < AUTO_DOWN_RPM && car.currentGear > 1){
      shifting = true; const targ = car.currentGear - 1; car.currentGear = 0;
      setTimeout(()=>{ car.currentGear = targ; shifting = false; }, NEUTRAL_DELAY_MS);
    }
  }

  // world wrap
  const lim = TRACK_RADIUS * 4;
  if(car.pos[2] > lim) car.pos[2] = -lim;
  if(car.pos[2] < -lim) car.pos[2] = lim;
  if(car.pos[0] > lim) car.pos[0] = -lim;
  if(car.pos[0] < -lim) car.pos[0] = lim;

  // checkpoint detection
  const cpRadius = TRACK_WIDTH * 1.4;
  for(let i=0;i<checkpoints.length;i++){
    const cp = checkpoints[i];
    const d2 = (car.pos[0]-cp.pos[0])**2 + (car.pos[2]-cp.pos[2])**2;
    if(d2 < (cpRadius*cpRadius) && lapState.nextIndex === cp.index){
      checkpoints[i].visited = true;
      lapState.advanceCheckpoint();
      document.getElementById('next-check').textContent = `Next: ${lapState.nextIndex+1} / ${checkpoints.length}`;
    }
  }
}

function isOffTrack(pos){
  let best = Infinity;
  for(let i=0;i<trackPoints.length;i+=4){
    const p = trackPoints[i];
    const d2 = (pos[0]-p.x)*(pos[0]-p.x) + (pos[2]-p.z)*(pos[2]-p.z);
    if(d2 < best) best = d2;
  }
  return Math.sqrt(best) > TRACK_WIDTH * 0.95;
}

/* ----- lap state ----- */
const lapState = { nextIndex:0, laps:0, lapStart:null, bestLap:null, started:false, reset:function(){ this.nextIndex=0; this.laps=0; this.lapStart=null; this.bestLap=null; this.started=false; checkpoints.forEach(c=>c.visited=false); document.getElementById('next-check').textContent = `Next: ${this.nextIndex+1} / ${checkpoints.length}`; document.getElementById('lap').textContent = `Lap: ${this.laps}`; document.getElementById('lap-time').textContent = `Lap: 0.00s`; }, advanceCheckpoint:function(){ if(this.nextIndex===0 && !this.started){ this.started=true; this.lapStart=performance.now(); this.nextIndex=1%checkpoints.length; return; } this.nextIndex++; if(this.nextIndex >= checkpoints.length){ const now=performance.now(); const lapTime=this.lapStart ? (now - this.lapStart)/1000 : 0; this.laps++; if(this.bestLap===null || (lapTime>0 && lapTime < this.bestLap)) this.bestLap = lapTime; this.lapStart = now; this.nextIndex = 0; checkpoints.forEach(c=>c.visited=false); } document.getElementById('lap').textContent = `Lap: ${this.laps}`; } };
lapState.reset();

/* ----- skid mark rendering ----- */
function drawSkidMarks(camPos, camYaw){
  if(skidMarks.length === 0) return;
  ctx.save();
  for(let i=0;i<skidMarks.length;i++){
    const s = skidMarks[i];
    const a = project([s.x1, 0.01, s.z1], camPos, camYaw);
    const b = project([s.x2, 0.01, s.z2], camPos, camYaw);
    if(!a || !b) continue;
    const t = s.life / s.lifeMax;
    const alpha = clamp(t * 0.95, 0, 0.95);
    const widthPx = Math.max(1.2, s.width * DPR * 6 * (0.4 + 0.6 * t));
    ctx.globalAlpha = alpha;
    // inner dark line
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = 'rgba(8,8,8,1)';
    ctx.lineWidth = widthPx;
    ctx.lineCap = 'round';
    ctx.stroke();
    // soft outer blur (destination-over) to deepen appearance under some blending
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = 'rgba(40,40,40,0.45)';
    ctx.lineWidth = Math.max(1, widthPx * 1.6);
    ctx.globalCompositeOperation = 'destination-over';
    ctx.stroke();
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

/* ----- main loop & camera ----- */
let camPos = [0,3,-9], camYaw = 0;
function frame(ts){
  const dtRaw = Math.min(0.05, (ts - lastTs)/1000); lastTs = ts;
  const steps = Math.max(1, Math.min(10, Math.ceil(dtRaw / 0.012)));
  const stepDt = dtRaw / steps;
  for(let i=0;i<steps;i++) physicsStep(stepDt);

  // camera follow (FIX: earlier projection/mapping mismatch caused camera to appear offset; projection now returns canvas buffer coords)
  const fwd = [ Math.sin(car.heading), 0, Math.cos(car.heading) ];
  const camTarget = V.add(car.pos, V.add(V.mul(fwd, -9.2), [0,3.4,0]));
  camPos = [ lerp(camPos[0], camTarget[0], 0.12), lerp(camPos[1], camTarget[1], 0.12), lerp(camPos[2], camTarget[2], 0.12) ];
  camYaw = lerp(camYaw, car.heading, 0.12);

  // draw
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const g = ctx.createLinearGradient(0,0,0,canvas.height*0.58);
  g.addColorStop(0, '#9bd8ff');
  g.addColorStop(1, '#0b80d6');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,canvas.width, Math.floor(canvas.height*0.58));

  drawGroundPlane(camPos, camYaw);
  drawTrack(camPos, camYaw);

  // skid marks on road
  drawSkidMarks(camPos, camYaw);

  drawCheckpoints(camPos, camYaw);

  // car draw uses wheelState's compression values which are updated during physicsStep
  drawCar(car.pos, car.heading, '#0077cc');

  // HUD updates (DOM)
  const spdMS = Math.hypot(car.vel[0],car.vel[1],car.vel[2]);
  let spdMph = spdMS * 2.2369362920544;
  if(isOffTrack(car.pos)) spdMph = Math.min(spdMph, spdMph * OFF_TRACK_MAX_SPEED_MULT);
  const displayedSpeed = Math.round(spdMph * DISPLAY_SPEED_BOOST);
  document.getElementById('speed').innerHTML = `SPD:<span class="speed-num">${displayedSpeed}</span> mph`;

  const wheelOmega = V.dot(car.vel, [Math.sin(car.heading),0,Math.cos(car.heading)]) / car.wheelRadius;
  let displayedRpm;
  if(engineActualRPM > car.rpmRedline){
    displayedRpm = Math.round(car.rpmRedline + Math.abs(Math.sin(performance.now()*0.02)) * 250);
  } else {
    displayedRpm = Math.round(engineActualRPM);
  }
  document.getElementById('rpm').textContent = `RPM: ${Math.min(9999, displayedRpm|0)}`;
  const gearLabel = car.currentGear === -1 ? 'R' : (car.currentGear === 0 ? 'N' : ''+car.currentGear);
  document.getElementById('gear').textContent = `Gear: ${gearLabel}`;

  const lapNow = lapState.started && lapState.lapStart ? (performance.now() - lapState.lapStart) / 1000 : 0;
  document.getElementById('lap-time').textContent = `Lap: ${lapNow.toFixed(2)}s${lapState.bestLap ? ' | Best: '+lapState.bestLap.toFixed(2)+'s' : ''}`;
  document.getElementById('next-check').textContent = `Next: ${lapState.nextIndex+1} / ${checkpoints.length}`;

  // reposition tach if layout changed (safeguard)
  positionTachUnderLeftHud();
  drawTach(displayedRpm, gearLabel);

  requestAnimationFrame(frame);
}

/* tach */
function drawTach(rpm, gearLabel){
  const w = tachCanvas.width, h = tachCanvas.height;
  tctx.clearRect(0,0,w,h);
  const cx = w/2, cy = h/2, r = Math.min(w,h)*0.42;
  tctx.beginPath(); tctx.arc(cx,cy,r+6,0,Math.PI*2); tctx.fillStyle = 'rgba(0,0,0,0.45)'; tctx.fill();
  const maxTick = 8; // 0..8 = 0..8000 rpm
  const startA = -Math.PI*0.75;
  const endA = Math.PI*0.25;
  for(let k=0;k<=maxTick;k++){
    const t = k / maxTick;
    const ang = lerp(startA,endA,t);
    const x1 = cx + Math.cos(ang)*(r*0.88);
    const y1 = cy + Math.sin(ang)*(r*0.88);
    const x2 = cx + Math.cos(ang)*(r*1.02);
    const y2 = cy + Math.sin(ang)*(r*1.02);
    tctx.beginPath(); tctx.moveTo(x1,y1); tctx.lineTo(x2,y2);
    tctx.strokeStyle = '#fff'; tctx.lineWidth = Math.max(1, DPR*2.0); tctx.stroke();
    const label = `${k}k`;
    tctx.fillStyle = '#fff'; tctx.font = `${Math.floor(10*DPR)}px monospace`; tctx.textAlign = 'center'; tctx.textBaseline = 'middle';
    const lx = cx + Math.cos(ang)*(r*0.72);
    const ly = cy + Math.sin(ang)*(r*0.72);
    tctx.fillText(label, lx, ly);
  }
  // redline arc based on REDLINE
  const redStart = lerp(startA, endA, clamp(REDLINE / (maxTick*1000), 0, 1));
  tctx.beginPath(); tctx.arc(cx,cy,r*0.92, redStart, endA);
  tctx.lineWidth = Math.max(4, DPR*4); tctx.strokeStyle = 'rgba(255,0,0,0.85)'; tctx.stroke();
  const rpmClamped = Math.min(Math.max(rpm,0), maxTick*1000);
  const ang = lerp(startA, endA, rpmClamped / (maxTick*1000));
  tctx.beginPath(); tctx.moveTo(cx,cy);
  const nx = cx + Math.cos(ang)*(r*0.86), ny = cy + Math.sin(ang)*(r*0.86);
  tctx.lineTo(nx,ny); tctx.strokeStyle = 'red'; tctx.lineWidth = Math.max(3, DPR*3); tctx.stroke();
  tctx.beginPath(); tctx.arc(cx,cy, Math.max(4, DPR*4),0,Math.PI*2); tctx.fillStyle='rgba(0,0,0,0.85)'; tctx.fill();
  tctx.beginPath(); tctx.arc(cx,cy, Math.max(2, DPR*2),0,Math.PI*2); tctx.fillStyle='red'; tctx.fill();
  tctx.fillStyle = '#fff'; tctx.font = `${Math.floor(14*DPR)}px monospace`; tctx.textAlign='center'; tctx.fillText(gearLabel, cx, cy + r*0.58);
}

/* spawn at checkpoint */
function placeInitialSpawn(){
  if(checkpoints.length){
    const cp = checkpoints[0];
    const spawn = V.add(cp.pos, V.mul(cp.tan, -22));
    car.pos = [spawn[0], car.suspensionRest, spawn[2]];
    car.heading = Math.atan2(cp.tan[0], cp.tan[2]);
  } else {
    car.pos=[0,car.suspensionRest,-40]; car.heading=0;
  }
  camPos = V.add(car.pos, [0,3,-9]);
}
generateCheckpoints(14);
placeInitialSpawn();

/* reset */
function resetCar(){
  placeInitialSpawn();
  car.vel=[0,0,0]; car.yawRate=0; car.currentGear=1; engineActualRPM = car.rpmIdle; car.clutchEngaged = true; input.throttle=false; input.brake=false; lapState.reset();
}

/* init */
requestAnimationFrame((t)=>{ lastTs = t; frame(t); });

/* ensure layout/Reposition on fonts/images loaded and after DOM operations */
window.addEventListener('load', ()=>{ resize(); setTimeout(positionTachUnderLeftHud, 120); });
setInterval(positionTachUnderLeftHud, 1000); // small safeguard if something reflows

</script>
</body>
