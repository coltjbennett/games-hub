<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Break Through</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #050505; overflow: hidden; font-family: 'Courier New', Courier, monospace; touch-action: none; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        canvas { background-color: #000; box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); max-width: 100%; max-height: 70vh; object-fit: contain; }
        #touchControls { margin-top: 20px; display: flex; gap: 20px; }
        .btn { width: 80px; height: 60px; background: rgba(0, 255, 255, 0.1); border: 2px solid #0ff; color: #0ff; font-weight: bold; font-size: 24px; display: flex; justify-content: center; align-items: center; user-select: none; border-radius: 10px; box-shadow: 0 0 10px #0ff, inset 0 0 10px #0ff; }
        .btn:active { background: rgba(0, 255, 255, 0.3); box-shadow: 0 0 20px #0ff, inset 0 0 20px #0ff; }
        @media (hover: hover) and (pointer: fine) { #touchControls { display: none; } canvas { max-height: 90vh; } }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <div id="touchControls">
        <div class="btn" id="btnLeft">◄</div>
        <div class="btn" id="btnRight">►</div>
    </div>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let paddle, ball, bricks = [], score = 0, gameState = 'START';
    const keys = { left: false, right: false };

    function init() {
        paddle = { x: canvas.width/2 - 40, y: canvas.height - 20, w: 80, h: 10, speed: 7 };
        ball = { x: canvas.width/2, y: canvas.height - 30, r: 5, dx: 4, dy: -4 };
        bricks = []; score = 0;
        let colors = ['#f0f', '#0ff', '#ff0', '#0f0'];
        for(let r=0; r<4; r++) {
            for(let c=0; c<10; c++) {
                bricks.push({ x: c*55 + 28, y: r*25 + 40, w: 50, h: 15, color: colors[r], active: true });
            }
        }
        gameState = 'PLAYING';
    }

    const setKey = (k, v) => { if(gameState !== 'PLAYING' && v) init(); keys[k] = v; };
    window.addEventListener('keydown', e => { if(e.key==='ArrowLeft') setKey('left', true); if(e.key==='ArrowRight') setKey('right', true); });
    window.addEventListener('keyup', e => { if(e.key==='ArrowLeft') setKey('left', false); if(e.key==='ArrowRight') setKey('right', false); });
    
    ['btnLeft', 'btnRight'].forEach((id, i) => {
        let dir = i === 0 ? 'left' : 'right';
        document.getElementById(id).addEventListener('touchstart', e => { e.preventDefault(); setKey(dir, true); });
        document.getElementById(id).addEventListener('touchend', e => { e.preventDefault(); setKey(dir, false); });
    });

    function update() {
        if(gameState !== 'PLAYING') return;

        if(keys.left) paddle.x = Math.max(0, paddle.x - paddle.speed);
        if(keys.right) paddle.x = Math.min(canvas.width - paddle.w, paddle.x + paddle.speed);

        ball.x += ball.dx; ball.y += ball.dy;

        // Walls
        if(ball.x - ball.r < 0 || ball.x + ball.r > canvas.width) ball.dx *= -1;
        if(ball.y - ball.r < 0) ball.dy *= -1;
        if(ball.y + ball.r > canvas.height) gameState = 'GAMEOVER';

        // Paddle
        if(ball.y + ball.r > paddle.y && ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
            ball.dy = -Math.abs(ball.dy);
            ball.dx = ((ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2)) * 5; // Angle based on hit spot
        }

        // Bricks
        bricks.forEach(b => {
            if(b.active && ball.x > b.x && ball.x < b.x + b.w && ball.y - ball.r < b.y + b.h && ball.y + ball.r > b.y) {
                b.active = false; ball.dy *= -1; score += 10;
            }
        });
        
        if(bricks.every(b => !b.active)) init(); // Win & loop
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if(gameState !== 'PLAYING') {
            ctx.fillStyle = '#0ff'; ctx.shadowBlur = 15; ctx.shadowColor = '#0ff'; ctx.textAlign = 'center';
            ctx.font = '40px Courier New'; ctx.fillText(gameState === 'START' ? 'NEON BREAKOUT' : 'GAME OVER', canvas.width/2, canvas.height/2 - 20);
            ctx.font = '16px Courier New'; ctx.fillText('PRESS LEFT OR RIGHT TO PLAY', canvas.width/2, canvas.height/2 + 20);
            ctx.shadowBlur = 0; return;
        }

        // Draw Paddle
        ctx.fillStyle = '#0ff'; ctx.shadowBlur = 10; ctx.shadowColor = '#0ff';
        ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);

        // Draw Ball
        ctx.fillStyle = '#fff'; ctx.shadowColor = '#fff';
        ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();

        // Draw Bricks
        bricks.forEach(b => {
            if(b.active) {
                ctx.fillStyle = b.color; ctx.shadowColor = b.color;
                ctx.fillRect(b.x, b.y, b.w, b.h);
            }
        });
        ctx.shadowBlur = 0;
        
        ctx.fillStyle = '#fff'; ctx.font = '16px Courier New'; ctx.textAlign = 'left';
        ctx.fillText(`SCORE: ${score}`, 10, 20);
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    requestAnimationFrame(loop);
</script>
</body>
</html>
